<script>
// ========== API ==========
var API_BASE = (location.hostname === 'localhost' || location.hostname === '127.0.0.1') ? 'http://localhost:3000' : 'http://' + location.hostname + ':3000';

// 生成星空背景
(function() {
  var sf = document.getElementById('starfield');
  if (!sf) return;
  var types = ['', 'big', 'pink', 'mint'];
  var counts = { '': 40, 'big': 8, 'pink': 6, 'mint': 6 };
  Object.keys(counts).forEach(function(type) {
    for (var i = 0; i < counts[type]; i++) {
      var s = document.createElement('div');
      s.className = 'star' + (type ? ' ' + type : '');
      s.style.left = Math.random() * 100 + '%';
      s.style.top = Math.random() * 100 + '%';
      s.style.animationDelay = Math.random() * 3 + 's';
      s.style.animationDuration = (2 + Math.random() * 3) + 's';
      sf.appendChild(s);
    }
  });
  // 加 2 颗流星
  for (var j = 0; j < 2; j++) {
    var sh = document.createElement('div');
    sh.className = 'shooting-star';
    sh.style.top = (5 + Math.random() * 30) + '%';
    sh.style.animationDelay = (j * 4 + Math.random() * 2) + 's';
    sf.appendChild(sh);
  }
})();

// 已登录则把右上角入口指向个人中心
var mmToken = localStorage.getItem('mm_token');
if (mmToken) {
  var mmUser = null;
  try { mmUser = JSON.parse(localStorage.getItem('mm_user') || 'null'); } catch(e) {}
  var meEntry = document.getElementById('meEntry');
  if (meEntry) {
    meEntry.href = './profile.html';
    if (mmUser && mmUser.nickname) {
      var av = mmUser.avatar || mmUser.nickname.charAt(0);
      meEntry.innerHTML = '<span class="me-av">' + av + '</span><span>' + mmUser.nickname + '</span>';
    }
  }
  // 校验 token 是否仍有效
  fetch(API_BASE + '/api/auth/me?token=' + encodeURIComponent(mmToken))
    .then(function(r) { return r.json(); })
    .then(function(data) {
      if (!data.success) {
        localStorage.removeItem('mm_token'); localStorage.removeItem('mm_user');
        var e2 = document.getElementById('meEntry');
        if (e2) { e2.href = './login.html'; e2.innerHTML = '<span>我的</span>'; }
      }
    })
    .catch(function() {});
}

// 绑定房间到当前账号（已登录时）
function bindRoomIfLogin(roomId) {
  if (!mmToken) return;
  fetch(API_BASE + '/api/room/' + roomId + '/bind?token=' + encodeURIComponent(mmToken), {
    method: 'POST', headers: { 'Content-Type': 'application/json' }, body: '{}'
  }).catch(function() {});
}

// ========== Modal control ==========
function openModal(type) {
  if (type === 'invite') {
    createInvite();
  }
  document.getElementById('modal' + (type === 'enter' ? 'Enter' : 'Invite')).classList.add('active');
  if (type === 'enter') {
    setTimeout(function() {
      document.getElementById('keyInput').focus();
    }, 400);
  }
}

// 演示模式：一键进入 Demo
// 优先尝试有后端的完整体验（manmanshuo.html），后端不通时降级到纯前端 demo.html
function enterDemo() {
  var liveUrl = './manmanshuo.html?roomId=MM-DEMO&role=me&token=demo2026&demo=1';
  var offlineUrl = './demo.html';

  // 探测后端是否可用（1.5秒超时）
  var controller = (typeof AbortController !== 'undefined') ? new AbortController() : null;
  var timeoutId = setTimeout(function() { if (controller) controller.abort(); }, 1500);

  fetch((location.hostname === 'localhost' || location.hostname === '127.0.0.1' ? 'http://localhost:3000' : 'http://' + location.hostname + ':3000') + '/api/room/MM-DEMO?token=demo2026', { signal: controller ? controller.signal : undefined })
    .then(function(r) { clearTimeout(timeoutId); return r.json(); })
    .then(function(data) {
      if (data && data.success) {
        location.href = liveUrl;  // 后端可用 → 完整体验
      } else {
        location.href = offlineUrl;  // 后端不通 → 纯前端展示
      }
    })
    .catch(function() { location.href = offlineUrl; });  // 超时或错误 → 纯前端展示
}

function closeModal(type) {
  document.getElementById('modal' + (type === 'enter' ? 'Enter' : 'Invite')).classList.remove('active');
  if (type === 'enter') {
    var input = document.getElementById('keyInput');
    var hint = document.getElementById('keyHint');
    input.value = '';
    hint.textContent = '钥匙样式：MM-XXXX（4 位字母或数字）';
    hint.classList.remove('error');
  }
}

// Click outside to close
document.querySelectorAll('.modal-overlay').forEach(function(overlay) {
  overlay.addEventListener('click', function(e) {
    if (e.target === overlay) {
      var type = overlay.id === 'modalEnter' ? 'enter' : 'invite';
      closeModal(type);
    }
  });
});

// ========== Enter space (join as Ta) ==========
var keyInput = document.getElementById('keyInput');
keyInput.addEventListener('input', function(e) {
  var v = e.target.value.toUpperCase().replace(/[^A-Z0-9-]/g, '');
  if (v.length > 0 && !v.startsWith('M')) {
    v = 'MM-' + v.replace(/^M+-?/, '');
  }
  if (v.length === 2 && !v.includes('-')) {
    v = v + '-';
  }
  e.target.value = v;
  var hint = document.getElementById('keyHint');
  hint.textContent = '钥匙样式：MM-XXXX（4 位字母或数字）';
  hint.classList.remove('error');
});

function tryEnter() {
  var key = keyInput.value.trim().toUpperCase();
  var hint = document.getElementById('keyHint');
  var btn = document.getElementById('enterBtn');

  if (!/^MM-[A-Z0-9]{4}$/.test(key)) {
    hint.textContent = '这把钥匙好像不是这扇门的';
    hint.classList.add('error');
    keyInput.classList.add('shake');
    setTimeout(function() { keyInput.classList.remove('shake'); }, 400);
    return;
  }

  btn.textContent = '正在开门……';
  btn.classList.add('success');

  // Join room via API
  fetch(API_BASE + '/api/room/join', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ roomId: key })
  })
  .then(function(r) { return r.json(); })
  .then(function(data) {
    if (!data.success) {
      hint.textContent = '这把钥匙好像不是这扇门的';
      hint.classList.add('error');
      btn.textContent = '开启空间';
      btn.classList.remove('success');
      return;
    }
    bindRoomIfLogin(key);
    goToSpace(key, 'ta');
  })
  .catch(function() {
    hint.textContent = '连接失败，请重试';
    hint.classList.add('error');
    btn.textContent = '开启空间';
    btn.classList.remove('success');
  });
}

function goToSpace(roomId, role, token) {
  document.body.style.transition = 'opacity 0.8s ease';
  setTimeout(function() { document.body.style.opacity = '0'; }, 400);
  setTimeout(function() {
    var tokenStr = token ? '&token=' + token : '';
    window.location.href = './envelope.html?roomId=' + roomId + '&role=' + role + tokenStr;
  }, 1100);
}

// ========== Invite (create room as Me) ==========
var inviteRoomId = '';

function createInvite() {
  var btn = document.getElementById('copyBtn');
  btn.textContent = '生成中……';
  btn.disabled = true;

  fetch(API_BASE + '/api/room/create', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' }
  })
  .then(function(r) { return r.json(); })
  .then(function(data) {
    inviteRoomId = data.roomId;
    bindRoomIfLogin(inviteRoomId);
    var inviteToken = data.token || '';
    document.getElementById('genKey').textContent = inviteRoomId;
    document.getElementById('inviteText').textContent =
      '"我给我们留了一个安静的小空间。这是钥匙：' + inviteRoomId + '，慢慢说见。"';
    btn.textContent = '复制邀请';
    btn.classList.remove('success');
    btn.disabled = false;
    // Auto-navigate to space as 'me' with token
    if (inviteToken) {
      setTimeout(function() { goToSpace(inviteRoomId, 'me', inviteToken); }, 1500);
    }
  })
  .catch(function() {
    // Fallback: generate locally
    generateKey();
    btn.textContent = '复制邀请';
    btn.disabled = false;
  });
}

function generateKey() {
  var chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  var key = 'MM-';
  for (var i = 0; i < 4; i++) {
    key += chars.charAt(Math.floor(Math.random() * chars.length));
  }
  inviteRoomId = key;
  document.getElementById('genKey').textContent = key;
  document.getElementById('inviteText').textContent =
    '"我给我们留了一个安静的小空间。这是钥匙：' + key + '，慢慢说见。"';
}

function copyInvite() {
  var text = document.getElementById('inviteText').textContent;
  text = text.replace(/^"|"$/g, '');
  var btn = document.getElementById('copyBtn');

  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(function() {
      btn.textContent = '✓ 已复制，发给 Ta 吧';
      btn.classList.add('success');
      // Auto-redirect after copy
      setTimeout(function() {
        goToSpace(inviteRoomId, 'me');
      }, 2000);
    });
  } else {
    var ta = document.createElement('textarea');
    ta.value = text;
    document.body.appendChild(ta);
    ta.select();
    try { document.execCommand('copy'); } catch(e) {}
    document.body.removeChild(ta);
    btn.textContent = '✓ 已复制，发给 Ta 吧';
    btn.classList.add('success');
    setTimeout(function() {
      goToSpace(inviteRoomId, 'me');
    }, 2000);
  }
}

// Allow Enter to submit
keyInput.addEventListener('keypress', function(e) {
  if (e.key === 'Enter') tryEnter();
});

// ESC to close any open modal
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') {
    closeModal('enter');
    closeModal('invite');
  }
});
</script>
