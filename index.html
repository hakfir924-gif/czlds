<!-- ===== MODAL: 开启我的空间 ===== -->
<div class="modal-overlay" id="modalEnter">
  <div class="modal">
    <button class="modal-close" onclick="closeModal('enter')">×</button>
    <div class="modal-icon">🔑</div>
    <h2 class="modal-title">开启我的空间</h2>
    <p class="modal-desc">输入你们的小空间钥匙，<br>慢慢推开这扇门。</p>

    <div class="key-input-wrap">
      <input type="text" class="key-input" id="keyInput" placeholder="MM-XXXX" maxlength="7" autocomplete="off">
    </div>
    <p class="key-hint" id="keyHint">钥匙样式：MM-XXXX（4 位字母或数字）</p>

    <button class="modal-btn" id="enterBtn" onclick="tryEnter()">开启空间</button>

    <p class="modal-tip">没有钥匙？先邀请 Ta，或者让 Ta 邀请你。</p>
  </div>
</div>

<!-- ===== MODAL: 邀请 Ta 进入 ===== -->
<div class="modal-overlay" id="modalInvite">
  <div class="modal">
    <button class="modal-close" onclick="closeModal('invite')">×</button>
    <div class="modal-icon">✉️</div>
    <h2 class="modal-title">邀请 Ta 进入</h2>
    <p class="modal-desc">这是你们的小空间钥匙，<br>把它发给 Ta，慢慢说见。</p>

    <div class="gen-key-card">
      <div class="gen-key-label">小空间钥匙</div>
      <div class="gen-key-value" id="genKey">MM-7K3X</div>
    </div>

    <div class="invite-text-card" id="inviteText">
      "我给我们留了一个安静的小空间。这是钥匙：MM-7K3X，慢慢说见。"
    </div>

    <button class="modal-btn" id="copyBtn" onclick="copyInvite()">复制邀请</button>

    <p class="modal-tip">等 Ta 用这把钥匙进来，<br>你们就在同一个空间了。</p>
  </div>
</div>

<script>
// ========== API ==========
var API_BASE = 'http://localhost:3000';

// ========== Modal control ==========
function openModal(type) {
  if (type === 'invite') {
    createInvite();
  }
  document.getElementById('modal' + (type === 'enter' ? 'Enter' : 'Invite')).classList.add('active');
  if (type === 'enter') {
    setTimeout(function() {
      document.getElementById('keyInput').focus();
    }, 400);
  }
}

function closeModal(type) {
  document.getElementById('modal' + (type === 'enter' ? 'Enter' : 'Invite')).classList.remove('active');
  if (type === 'enter') {
    var input = document.getElementById('keyInput');
    var hint = document.getElementById('keyHint');
    input.value = '';
    hint.textContent = '钥匙样式：MM-XXXX（4 位字母或数字）';
    hint.classList.remove('error');
  }
}

// Click outside to close
document.querySelectorAll('.modal-overlay').forEach(function(overlay) {
  overlay.addEventListener('click', function(e) {
    if (e.target === overlay) {
      var type = overlay.id === 'modalEnter' ? 'enter' : 'invite';
      closeModal(type);
    }
  });
});

// ========== Enter space (join as Ta) ==========
var keyInput = document.getElementById('keyInput');
keyInput.addEventListener('input', function(e) {
  var v = e.target.value.toUpperCase().replace(/[^A-Z0-9-]/g, '');
  if (v.length > 0 && !v.startsWith('M')) {
    v = 'MM-' + v.replace(/^M+-?/, '');
  }
  if (v.length === 2 && !v.includes('-')) {
    v = v + '-';
  }
  e.target.value = v;
  var hint = document.getElementById('keyHint');
  hint.textContent = '钥匙样式：MM-XXXX（4 位字母或数字）';
  hint.classList.remove('error');
});

function tryEnter() {
  var key = keyInput.value.trim().toUpperCase();
  var hint = document.getElementById('keyHint');
  var btn = document.getElementById('enterBtn');

  if (!/^MM-[A-Z0-9]{4}$/.test(key)) {
    hint.textContent = '这把钥匙好像不是这扇门的';
    hint.classList.add('error');
    keyInput.classList.add('shake');
    setTimeout(function() { keyInput.classList.remove('shake'); }, 400);
    return;
  }

  btn.textContent = '正在开门……';
  btn.classList.add('success');

  // Join room via API
  fetch(API_BASE + '/api/room/join', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ roomId: key })
  })
  .then(function(r) { return r.json(); })
  .then(function(data) {
    if (!data.success) {
      hint.textContent = '这把钥匙好像不是这扇门的';
      hint.classList.add('error');
      btn.textContent = '开启空间';
      btn.classList.remove('success');
      return;
    }
    goToSpace(key, 'ta');
  })
  .catch(function() {
    hint.textContent = '连接失败，请重试';
    hint.classList.add('error');
    btn.textContent = '开启空间';
    btn.classList.remove('success');
  });
}

function goToSpace(roomId, role) {
  document.body.style.transition = 'opacity 0.8s ease';
  setTimeout(function() { document.body.style.opacity = '0'; }, 400);
  setTimeout(function() {
    window.location.href = './envelope.html?roomId=' + roomId + '&role=' + role;
  }, 1100);
}

// ========== Invite (create room as Me) ==========
var inviteRoomId = '';

function createInvite() {
  var btn = document.getElementById('copyBtn');
  btn.textContent = '生成中……';
  btn.disabled = true;

  fetch(API_BASE + '/api/room/create', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' }
  })
  .then(function(r) { return r.json(); })
  .then(function(data) {
    inviteRoomId = data.roomId;
    document.getElementById('genKey').textContent = inviteRoomId;
    document.getElementById('inviteText').textContent =
      '"我给我们留了一个安静的小空间。这是钥匙：' + inviteRoomId + '，慢慢说见。"';
    btn.textContent = '复制邀请';
    btn.classList.remove('success');
    btn.disabled = false;
  })
  .catch(function() {
    // Fallback: generate locally
    generateKey();
    btn.textContent = '复制邀请';
    btn.disabled = false;
  });
}

function generateKey() {
  var chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  var key = 'MM-';
  for (var i = 0; i < 4; i++) {
    key += chars.charAt(Math.floor(Math.random() * chars.length));
  }
  inviteRoomId = key;
  document.getElementById('genKey').textContent = key;
  document.getElementById('inviteText').textContent =
    '"我给我们留了一个安静的小空间。这是钥匙：' + key + '，慢慢说见。"';
}

function copyInvite() {
  var text = document.getElementById('inviteText').textContent;
  text = text.replace(/^"|"$/g, '');
  var btn = document.getElementById('copyBtn');

  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(function() {
      btn.textContent = '✓ 已复制，发给 Ta 吧';
      btn.classList.add('success');
      // Auto-redirect after copy
      setTimeout(function() {
        goToSpace(inviteRoomId, 'me');
      }, 2000);
    });
  } else {
    var ta = document.createElement('textarea');
    ta.value = text;
    document.body.appendChild(ta);
    ta.select();
    try { document.execCommand('copy'); } catch(e) {}
    document.body.removeChild(ta);
    btn.textContent = '✓ 已复制，发给 Ta 吧';
    btn.classList.add('success');
    setTimeout(function() {
      goToSpace(inviteRoomId, 'me');
    }, 2000);
  }
}

// Allow Enter to submit
keyInput.addEventListener('keypress', function(e) {
  if (e.key === 'Enter') tryEnter();
});

// ESC to close any open modal
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') {
    closeModal('enter');
    closeModal('invite');
  }
});
</script>
