<script>
// ========== API ==========
var API_BASE = 'http://localhost:3000';

// ========== URL params ==========
var params = new URLSearchParams(window.location.search);
var roomId = params.get('roomId') || '';
var role = params.get('role') || 'me';
var serverVersion = 0;

// ========== SIGN FROM URL ==========
(function() {
  var type = params.get('signType');
  var content = params.get('signContent');
  if (type && content) {
    document.getElementById('signType').textContent = decodeURIComponent(type);
    document.getElementById('signText').textContent = decodeURIComponent(content);
  } else {
    var signs = [
      { type: '一句话', content: '今天不用很完美，今天你已经在对方心里了。' },
      { type: '一句话', content: '想念不说出口，但月亮知道，Ta也知道。' },
      { type: '一件小事', content: '今天给对方发一条语音，只说四个字：我想你了。' },
      { type: '一个问题', content: '如果现在你们在一起，你们会一起做什么？' }
    ];
    var s = signs[Math.floor(Math.random() * signs.length)];
    document.getElementById('signType').textContent = s.type;
    document.getElementById('signText').textContent = s.content;
  }
})();

// ========== Ta的微光 ==========
var taGlimmers = [
  { status: '😴 有点累', text: '今天开会到很晚，有点累，但想到周末可以见面就很开心。', time: '18:20' },
  { status: '😊 开心', text: '中午吃了你推荐的餐厅，真的很好吃，下次一起去。', time: '12:45' },
  { status: '😊 开心', text: '今天被老板夸了，第一个想分享的人就是你。', time: '15:10' },
  { status: '😌 平静', text: '下雨了，记得你上次说最喜欢下雨天窝在家里。', time: '16:30' },
  { status: '💭 在想你', text: '今天没什么特别的，就是突然很想你。', time: '21:05' }
];
var taHints = [
  '💡 Ta今天可能有点累，一个拥抱就够了',
  '💡 Ta今天心情不错，可以问问发生了什么开心的事',
  '💡 Ta今天被肯定了，跟Ta说一句"我就知道你可以"',
  '💡 Ta想起了你，回一句"我也在想你"',
  '💡 Ta今天有点想你，不用多说什么，告诉Ta你在就好'
];
var currentTa = Math.floor(Math.random() * taGlimmers.length);

function updateTaDisplay(data) {
  var taData = data || taGlimmers[currentTa];
  document.getElementById('taStatus').textContent = taData.status || '';
  document.getElementById('taGlimmer').textContent = taData.text || 'Ta还没有更新状态';
  document.getElementById('taTime').textContent = taData.time || '';
  var hint = document.getElementById('taHint');
  if (taData.status) {
    hint.textContent = taHints[currentTa];
    hint.style.display = 'block';
  }
  // Show AI hint if Ta has a status
  if (taData.status) {
    setTimeout(function() {
      hint.textContent = taHints[currentTa];
      hint.style.display = 'block';
    }, 3000);
  }
}

updateTaDisplay();

// ========== Polling: sync Ta's glimmer from server ==========
if (roomId) {
  function pollServer() {
    fetch(API_BASE + '/api/room/' + roomId + '/poll?since=' + serverVersion + '&role=' + role)
      .then(function(r) { return r.json(); })
      .then(function(data) {
        if (!data.hasUpdates || !data.roomData) return;
        serverVersion = data.version;
        var roomData = data.roomData;

        // Update Ta's glimmer (show the other person's glimmer)
        var otherRole = role === 'ta' ? 'me' : 'ta';
        var otherGlimmer = roomData.members[otherRole].glimmer;
        if (otherGlimmer && otherGlimmer.text) {
          document.getElementById('taStatus').textContent = otherGlimmer.status || '';
          document.getElementById('taGlimmer').textContent = otherGlimmer.text;
          document.getElementById('taTime').textContent = otherGlimmer.time || '';
        }
      })
      .catch(function() {});
  }

  pollServer();
  setInterval(pollServer, 3000);
}

// ========== 我的微光编辑 ==========
var selectedStatus = '';
var selectedEmoji = '';

function startEdit() {
  document.getElementById('myDisplay').style.display = 'none';
  document.getElementById('myEditPanel').style.display = 'block';
  document.getElementById('myEditBtn').style.display = 'none';
  document.getElementById('myEditText').value = document.getElementById('myGlimmer').textContent;
  document.querySelectorAll('#myStatusPicker .sp-item').forEach(function(el) { el.classList.remove('selected'); });
  selectedStatus = '';
  selectedEmoji = '';
  setTimeout(function() { document.getElementById('myEditText').focus(); }, 200);
}

function cancelEdit() {
  document.getElementById('myEditPanel').style.display = 'none';
  document.getElementById('myDisplay').style.display = 'block';
  document.getElementById('myEditBtn').style.display = 'block';
}

function saveMyGlimmer() {
  var text = document.getElementById('myEditText').value.trim();
  var now = new Date();
  var timeStr = String(now.getHours()).padStart(2, '0') + ':' + String(now.getMinutes()).padStart(2, '0');

  if (text) document.getElementById('myGlimmer').textContent = text;
  if (selectedStatus) {
    var sd = document.getElementById('myStatusDisplay');
    sd.textContent = selectedEmoji + ' ' + selectedStatus;
    sd.style.display = 'block';
  }
  document.getElementById('myTime').textContent = timeStr;

  // Save to localStorage for fallback
  var entries = JSON.parse(localStorage.getItem('mm_glimmer_entries') || '[]');
  entries.push({
    time: timeStr,
    status: selectedStatus ? (selectedEmoji + ' ' + selectedStatus) : '',
    text: text || document.getElementById('myGlimmer').textContent,
    type: role
  });
  localStorage.setItem('mm_glimmer_entries', JSON.stringify(entries));

  // Sync to server
  if (roomId) {
    fetch(API_BASE + '/api/room/' + roomId + '/glimmer', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        role: role,
        status: selectedStatus ? (selectedEmoji + ' ' + selectedStatus) : '',
        text: text || document.getElementById('myGlimmer').textContent,
        time: timeStr
      })
    }).catch(function() {});
  }

  document.getElementById('myEditPanel').style.display = 'none';
  document.getElementById('myDisplay').style.display = 'block';
  document.getElementById('myEditBtn').style.display = 'block';
  selectedStatus = '';
  selectedEmoji = '';
}

document.getElementById('myStatusPicker').addEventListener('click', function(e) {
  var item = e.target.closest('.sp-item');
  if (!item) return;
  document.querySelectorAll('#myStatusPicker .sp-item').forEach(function(el) { el.classList.remove('selected'); });
  item.classList.add('selected');
  selectedStatus = item.getAttribute('data-status');
  selectedEmoji = item.getAttribute('data-emoji');
});

  '今天一起看同一轮月亮，不管距离多远',
  '今天花一分钟，想想你们第一次见面的那天'
];

function refreshTogether() {
  var el = document.getElementById('togetherTopic');
  var newItem = togetherItems[Math.floor(Math.random() * togetherItems.length)];
  while (newItem === el.textContent.trim() && togetherItems.length > 1) {
    newItem = togetherItems[Math.floor(Math.random() * togetherItems.length)];
  }
  el.style.opacity = '0';
  el.style.transform = 'translateY(4px)';
  setTimeout(function() {
    el.textContent = newItem;
    el.style.opacity = '1';
    el.style.transform = 'translateY(0)';
  }, 300);

  var now = new Date();
  var timeStr = String(now.getHours()).padStart(2, '0') + ':' + String(now.getMinutes()).padStart(2, '0');
  var records = JSON.parse(localStorage.getItem('mm_together_records') || '[]');
  records.push({ time: timeStr, item: newItem, date: now.toLocaleDateString('zh-CN') });
  localStorage.setItem('mm_together_records', JSON.stringify(records));

  // Sync to server
  if (roomId) {
    fetch(API_BASE + '/api/room/' + roomId + '/together', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ item: newItem, time: timeStr, date: now.toLocaleDateString('zh-CN') })
    }).catch(function() {});
  }
}
