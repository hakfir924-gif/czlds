<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>慢慢说 · 演示</title>
<style>
/* ========== 字体引用 ========== */
@font-face {
  font-family: 'WorkSans';
  src: url('./_shared/fonts/WorkSans-Regular.ttf') format('truetype');
  font-weight: 400; font-style: normal;
}
@font-face {
  font-family: 'WorkSans';
  src: url('./_shared/fonts/WorkSans-Bold.ttf') format('truetype');
  font-weight: 700; font-style: normal;
}

/* ========== 配色 CSS 变量 ========== */
:root {
  /* 深紫星空页（封面/封底） */
  --bg-dark: #0f0a1e;
  --bg2-dark: #1a1233;
  --ink-light: #f0eaff;
  --accent-mint: #a8e6cf;
  --accent-pink: #ffd6e8;
  --muted-dark: #8478a8;
  /* 米白纸张页（内页） */
  --bg-paper: #f5f0e8;
  --ink-paper: #3a2e1f;
  --ink2-paper: #7a6a52;
  --accent-sage: #7a9e7e;
  --accent-rose: #c97d9d;
  --rule-paper: #d4c9b0;
  /* 字体 */
  --font-heading: 'WorkSans', 'PingFang SC', 'Noto Sans CJK SC', 'Microsoft YaHei', sans-serif;
  --font-body: 'PingFang SC', 'Noto Sans CJK SC', 'Microsoft YaHei', sans-serif;
}

/* ========== 重置与基础 ========== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  width: 100%; height: 100%; overflow: hidden;
  font-family: var(--font-body);
  background: #1a1530;
  color: var(--ink-paper);
  -webkit-font-smoothing: antialiased;
  -webkit-tap-highlight-color: transparent;
}
button { font-family: inherit; }

/* ========== 书本舞台 ========== */
.book-stage {
  position: relative;
  width: 100%;
  height: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  background: radial-gradient(ellipse at center, #2a2440 0%, #14102a 100%);
}

.book-wrapper {
  position: relative;
  width: 100%;
  max-width: 440px;
  height: 100%;
  max-height: 880px;
}

/* ========== 翻页书 3D 容器 ========== */
.book {
  position: relative;
  width: 100%;
  height: 100%;
  perspective: 2500px;
  transform-style: preserve-3d;
}

/* ========== 单页样式 ========== */
.page {
  position: absolute;
  inset: 0;
  background: var(--bg-paper);
  border-radius: 4px 12px 12px 4px;
  transform-origin: left center;
  transform-style: preserve-3d;
  transition: transform 0.7s cubic-bezier(0.4, 0, 0.2, 1);
  backface-visibility: hidden;
  -webkit-backface-visibility: hidden;
  overflow: hidden;
  box-shadow:
    0 6px 24px rgba(0,0,0,0.30),
    inset -1px 0 0 rgba(0,0,0,0.05),
    inset 1px 0 0 rgba(255,255,255,0.5);
}
.page.flipped {
  transform: rotateY(-180deg);
}

/* 书脊（左缘 18px 暗色渐变 + 2px 脊线） */
.page::before {
  content: '';
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 20px;
  background:
    linear-gradient(to right, rgba(58,46,31,0.22) 0%, rgba(58,46,31,0.10) 55%, transparent 100%);
  pointer-events: none;
  z-index: 5;
}
.page::after {
  content: '';
  position: absolute;
  left: 18px; top: 0; bottom: 0;
  width: 2px;
  background: linear-gradient(to bottom, transparent, rgba(58,46,31,0.18) 15%, rgba(58,46,31,0.18) 85%, transparent);
  pointer-events: none;
  z-index: 5;
}

/* 深紫星空页样式 */
.page.dark-page {
  background: radial-gradient(ellipse at 50% 40%, var(--bg2-dark) 0%, var(--bg-dark) 80%);
  color: var(--ink-light);
}
.page.dark-page::before {
  background: linear-gradient(to right, rgba(0,0,0,0.55) 0%, rgba(0,0,0,0.25) 55%, transparent 100%);
}
.page.dark-page::after {
  background: linear-gradient(to bottom, transparent, rgba(255,255,255,0.08) 15%, rgba(255,255,255,0.08) 85%, transparent);
}

/* 页角微卷（当前页右下角） */
.corner-curl {
  position: absolute;
  right: 0; bottom: 0;
  width: 36px; height: 36px;
  background: linear-gradient(135deg, transparent 50%, rgba(0,0,0,0.06) 52%, rgba(0,0,0,0.14) 100%);
  border-bottom-right-radius: 12px;
  pointer-events: none;
  z-index: 6;
  opacity: 0;
  transition: opacity 0.3s;
}
.page.current .corner-curl { opacity: 1; }

/* ========== 可滚动内容区 ========== */
.page-scroll {
  position: absolute;
  inset: 0;
  padding: 56px 26px 64px 30px;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  z-index: 2;
}
.page-scroll::-webkit-scrollbar { width: 3px; }
.page-scroll::-webkit-scrollbar-thumb { background: var(--rule-paper); border-radius: 2px; }

/* ========== 页头标签 ========== */
.page-header { margin-bottom: 18px; }
.page-tag {
  display: inline-block;
  font-size: 10px;
  letter-spacing: 3px;
  color: var(--accent-sage);
  border: 1px solid var(--accent-sage);
  padding: 3px 10px;
  border-radius: 10px;
  font-family: var(--font-heading);
  text-transform: uppercase;
  margin-bottom: 8px;
}
.page-tagline {
  font-size: 13px;
  color: var(--ink2-paper);
  font-style: italic;
  line-height: 1.5;
}

/* ========== 输入框 ========== */
.text-input {
  width: 100%;
  min-height: 76px;
  padding: 14px 16px;
  border: 1px solid var(--rule-paper);
  border-radius: 10px;
  background: rgba(255,255,255,0.55);
  color: var(--ink-paper);
  font-size: 14px;
  line-height: 1.55;
  font-family: var(--font-body);
  resize: none;
  outline: none;
  transition: border-color 0.2s, background 0.2s;
}
.text-input:focus {
  border-color: var(--accent-sage);
  background: rgba(255,255,255,0.75);
}
.text-input::placeholder {
  color: var(--ink2-paper);
  opacity: 0.55;
}

/* ========== 章节小标题 ========== */
.section-label {
  font-size: 12px;
  color: var(--ink2-paper);
  margin: 14px 0 8px;
  letter-spacing: 0.5px;
}

/* ========== 场景预设 chips ========== */
.scenario-row {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-bottom: 18px;
}
.scenario-chip {
  padding: 6px 12px;
  border-radius: 16px;
  border: 1px solid var(--rule-paper);
  background: transparent;
  color: var(--ink2-paper);
  font-size: 12px;
  cursor: pointer;
  transition: all 0.2s;
  white-space: nowrap;
}
.scenario-chip:hover, .scenario-chip.active {
  border-color: var(--accent-sage);
  color: var(--accent-sage);
  background: rgba(122,158,126,0.08);
}

/* ========== 主按钮 ========== */
.primary-btn {
  display: block;
  width: 100%;
  padding: 13px;
  border: none;
  border-radius: 10px;
  font-size: 15px;
  font-family: var(--font-heading);
  font-weight: 700;
  cursor: pointer;
  transition: all 0.2s;
  letter-spacing: 1px;
}
.mint-btn {
  background: var(--accent-sage);
  color: #fff;
  box-shadow: 0 4px 14px rgba(122,158,126,0.35);
}
.mint-btn:hover { background: #6b8e6f; transform: translateY(-1px); }
.mint-btn:active { transform: translateY(0); }
.hidden { display: none !important; }

/* ========== 结果区 ========== */
.result-area {
  display: none;
  margin-top: 18px;
  animation: fadeUp 0.4s ease;
}
.result-area.show { display: block; }
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}

.raw-quote {
  font-style: italic;
  color: var(--ink2-paper);
  font-size: 13px;
  line-height: 1.6;
  padding: 8px 12px;
  border-left: 2px solid var(--rule-paper);
  margin-bottom: 14px;
}

/* 流动光带 + 呼吸文字 */
.loading-bar {
  position: relative;
  height: 36px;
  margin-bottom: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  border-radius: 8px;
  background: rgba(255,255,255,0.35);
}
.light-band {
  position: absolute;
  inset: 0;
  background: linear-gradient(90deg, transparent 0%, rgba(122,158,126,0.45) 50%, transparent 100%);
  background-size: 200% 100%;
  animation: flow 1.5s linear;
}
@keyframes flow {
  from { background-position: 200% 0; }
  to { background-position: -200% 0; }
}
.loading-text {
  position: relative;
  font-size: 12px;
  color: var(--accent-sage);
  letter-spacing: 1px;
  animation: breathe 1.2s ease-in-out infinite;
}
@keyframes breathe {
  0%, 100% { opacity: 0.5; }
  50% { opacity: 1; }
}

/* 结果层 */
.result-layers {
  opacity: 0;
  transition: opacity 0.6s;
}
.result-layers.show { opacity: 1; }
.result-layer {
  margin-bottom: 14px;
  opacity: 0;
  transform: translateY(6px);
  transition: opacity 0.5s, transform 0.5s;
}
.result-layers.show .result-layer { opacity: 1; transform: translateY(0); }
.result-layers.show .result-layer:nth-child(1) { transition-delay: 0s; }
.result-layers.show .result-layer:nth-child(2) { transition-delay: 0.25s; }
.result-layers.show .result-layer:nth-child(3) { transition-delay: 0.5s; }

.layer-label {
  font-size: 11px;
  letter-spacing: 1.5px;
  color: var(--ink2-paper);
  margin-bottom: 6px;
  font-family: var(--font-heading);
  font-weight: 700;
}
.pink-label { color: var(--accent-rose); }
.mint-label { color: var(--accent-sage); }

.layer-content {
  font-size: 14px;
  line-height: 1.65;
  color: var(--ink-paper);
  padding: 10px 14px;
  background: rgba(255,255,255,0.45);
  border-radius: 8px;
}

/* 转化层（薄荷绿光晕卡片 + 呼吸） */
.transformed-card {
  padding: 14px;
  background: rgba(168,230,207,0.16);
  border: 1px solid rgba(122,158,126,0.35);
  border-radius: 12px;
  box-shadow: 0 0 18px rgba(168,230,207,0.22);
  animation: cardBreathe 2.6s ease-in-out infinite;
}
@keyframes cardBreathe {
  0%, 100% { box-shadow: 0 0 14px rgba(168,230,207,0.15); }
  50% { box-shadow: 0 0 26px rgba(168,230,207,0.38); }
}
.transformed-card .layer-content {
  background: transparent;
  padding: 0;
}

/* 备选 chips */
.chips {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}
.chip {
  padding: 6px 14px;
  border-radius: 16px;
  border: 1px solid var(--rule-paper);
  background: rgba(255,255,255,0.4);
  color: var(--ink2-paper);
  font-size: 12px;
  cursor: pointer;
  transition: all 0.2s;
}
.chip:hover { border-color: var(--accent-sage); color: var(--accent-sage); }
.chip.active {
  background: var(--accent-sage);
  color: #fff;
  border-color: var(--accent-sage);
}

/* ========== 第 3 页 送达 ========== */
.send-stage {
  position: relative;
  min-height: 360px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 24px 0;
}
.mint-card {
  width: 100%;
  padding: 18px 18px 20px;
  background: linear-gradient(135deg, rgba(168,230,207,0.25), rgba(122,158,126,0.18));
  border: 1px solid rgba(122,158,126,0.4);
  border-radius: 14px;
  box-shadow: 0 0 24px rgba(168,230,207,0.25);
  transition: opacity 0.4s;
}
.mint-card .card-label {
  font-size: 11px;
  color: var(--accent-sage);
  letter-spacing: 1.5px;
  margin-bottom: 8px;
  font-family: var(--font-heading);
  font-weight: 700;
}
.mint-card .card-content {
  font-size: 15px;
  line-height: 1.7;
  color: var(--ink-paper);
}
.particles {
  position: absolute;
  inset: 0;
  pointer-events: none;
  z-index: 4;
}
.particle {
  position: absolute;
  width: 6px; height: 6px;
  background: var(--accent-mint);
  border-radius: 50%;
  box-shadow: 0 0 8px rgba(168,230,207,0.7);
}
.received-text {
  text-align: center;
  opacity: 0;
  transition: opacity 0.8s;
}
.received-text.show { opacity: 1; }
.received-big {
  font-family: var(--font-heading);
  font-size: 38px;
  font-weight: 700;
  color: var(--accent-sage);
  letter-spacing: 4px;
  margin-bottom: 10px;
}
.received-sub {
  font-size: 13px;
  color: var(--ink2-paper);
  font-style: italic;
}

/* ========== 第 5 页 其他功能 ========== */
.features-title {
  font-family: var(--font-heading);
  font-size: 20px;
  font-weight: 700;
  color: var(--ink-paper);
  margin: 8px 0 4px;
  line-height: 1.4;
}
.features-sub {
  font-size: 12px;
  color: var(--ink2-paper);
  font-style: italic;
  margin-bottom: 18px;
}
.features-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}
.feature-card {
  padding: 16px 12px;
  background: rgba(255,255,255,0.5);
  border: 1px solid var(--rule-paper);
  border-radius: 12px;
  text-align: center;
  transition: transform 0.2s, box-shadow 0.2s;
}
.feature-card:hover {
  transform: translateY(-2px);
  box-shadow: 0 6px 16px rgba(122,158,126,0.18);
}
.feature-card:last-child { grid-column: 1 / -1; }
.feature-icon { font-size: 28px; margin-bottom: 6px; line-height: 1; }
.feature-name {
  font-family: var(--font-heading);
  font-size: 13px;
  font-weight: 700;
  color: var(--ink-paper);
  margin-bottom: 4px;
}
.feature-desc {
  font-size: 11px;
  color: var(--ink2-paper);
  line-height: 1.45;
}
.feature-card.active {
  background: rgba(122,158,126,0.15);
  border-color: var(--accent-sage);
  transform: translateY(-2px);
  box-shadow: 0 6px 16px rgba(122,158,126,0.25);
}
.feature-card.active .feature-name { color: var(--accent-sage); }
.feature-hint {
  font-size: 9px;
  color: var(--accent-sage);
  margin-top: 4px;
  letter-spacing: 0.05em;
  opacity: 0.7;
}

/* 功能预览面板 */
.feature-preview {
  margin-top: 14px;
  background: rgba(255,255,255,0.7);
  border: 1px solid var(--rule-paper);
  border-radius: 14px;
  padding: 16px 14px;
  min-height: 100px;
  opacity: 0;
  transform: translateY(8px);
  transition: opacity 0.35s ease, transform 0.35s ease;
}
.feature-preview.show {
  opacity: 1;
  transform: translateY(0);
}
.preview-empty {
  text-align: center;
  font-size: 11px;
  color: var(--ink2-paper);
  font-style: italic;
  padding: 20px 0;
  opacity: 0.6;
}
.preview-head {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  margin-bottom: 10px;
  padding-bottom: 8px;
  border-bottom: 1px dashed var(--rule-paper);
}
.preview-title {
  font-family: var(--font-heading);
  font-size: 13px;
  font-weight: 700;
  color: var(--ink-paper);
}
.preview-sub {
  font-size: 10px;
  color: var(--ink2-paper);
}

/* 微光预览 */
.glimmer-list { display: flex; flex-direction: column; gap: 8px; }
.glimmer-item {
  display: flex;
  align-items: flex-start;
  gap: 8px;
  padding: 8px 10px;
  background: rgba(255,255,255,0.5);
  border-radius: 10px;
  border-left: 3px solid var(--accent-sage);
}
.glimmer-item.ta { border-left-color: var(--accent-rose); }
.glimmer-emoji { font-size: 18px; line-height: 1.4; }
.glimmer-body { flex: 1; min-width: 0; }
.glimmer-meta {
  display: flex;
  align-items: center;
  gap: 6px;
  margin-bottom: 2px;
}
.glimmer-role {
  font-size: 10px;
  font-weight: 700;
  color: var(--accent-sage);
}
.glimmer-item.ta .glimmer-role { color: var(--accent-rose); }
.glimmer-mood {
  font-size: 10px;
  color: var(--ink2-paper);
}
.glimmer-time {
  font-size: 9px;
  color: var(--ink2-paper);
  opacity: 0.7;
  margin-left: auto;
}
.glimmer-text {
  font-size: 11px;
  color: var(--ink-paper);
  line-height: 1.5;
}

/* 每日一问预览 */
.pq-question {
  font-size: 12px;
  font-weight: 600;
  color: var(--ink-paper);
  margin-bottom: 10px;
  padding: 8px 10px;
  background: rgba(122,158,126,0.1);
  border-radius: 8px;
  text-align: center;
}
.pq-answers { display: flex; flex-direction: column; gap: 6px; }
.pq-row {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 11px;
}
.pq-tag {
  flex-shrink: 0;
  width: 24px;
  height: 24px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 10px;
  font-weight: 700;
  color: #fff;
  background: var(--accent-sage);
}
.pq-row.ta .pq-tag { background: var(--accent-rose); }
.pq-text {
  color: var(--ink-paper);
  line-height: 1.5;
}

/* 默契挑战预览 */
.chal-question {
  font-size: 12px;
  font-weight: 600;
  color: var(--ink-paper);
  margin-bottom: 10px;
  text-align: center;
  padding: 8px 10px;
  background: rgba(201,125,157,0.1);
  border-radius: 8px;
}
.chal-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 6px 10px;
  background: rgba(255,255,255,0.5);
  border-radius: 8px;
  margin-bottom: 6px;
  font-size: 11px;
}
.chal-label { color: var(--ink2-paper); }
.chal-val { color: var(--ink-paper); font-weight: 600; }
.chal-result {
  margin-top: 8px;
  text-align: center;
  padding: 8px;
  background: linear-gradient(135deg, rgba(122,158,126,0.18), rgba(168,230,207,0.18));
  border-radius: 10px;
  font-size: 12px;
  font-weight: 700;
  color: var(--accent-sage);
}
.chal-result.nomatch {
  background: linear-gradient(135deg, rgba(201,125,157,0.18), rgba(255,214,232,0.18));
  color: var(--accent-rose);
}

/* 此刻予你预览 */
.moment-theme {
  font-size: 12px;
  font-weight: 600;
  color: var(--ink-paper);
  margin-bottom: 10px;
  text-align: center;
  padding: 8px 10px;
  background: rgba(245,184,134,0.15);
  border-radius: 8px;
}
.moment-photos {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
}
.moment-photo {
  border-radius: 10px;
  overflow: hidden;
}
.moment-photo-img {
  height: 60px;
  border-radius: 8px 8px 0 0;
}
.moment-photo-info {
  padding: 6px 8px;
  background: rgba(255,255,255,0.6);
  border-radius: 0 0 8px 8px;
}
.moment-photo-role {
  font-size: 9px;
  font-weight: 700;
  color: var(--accent-sage);
}
.moment-photo-note {
  font-size: 10px;
  color: var(--ink-paper);
  line-height: 1.4;
  margin-top: 2px;
}

/* 月度回顾预览 */
.review-stats {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 6px;
  margin-bottom: 10px;
}
.review-stat {
  text-align: center;
  padding: 8px 4px;
  background: rgba(255,255,255,0.5);
  border-radius: 8px;
}
.review-num {
  font-family: var(--font-heading);
  font-size: 18px;
  font-weight: 700;
  color: var(--accent-sage);
  line-height: 1;
}
.review-label {
  font-size: 9px;
  color: var(--ink2-paper);
  margin-top: 3px;
}
.review-summary {
  font-size: 11px;
  color: var(--ink-paper);
  line-height: 1.6;
  padding: 10px;
  background: rgba(122,158,126,0.08);
  border-left: 3px solid var(--accent-sage);
  border-radius: 0 8px 8px 0;
  font-style: italic;
}

/* ========== 封面/封底内容 ========== */
.cover-content {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 0 36px;
  z-index: 3;
}
.cover-title {
  font-family: var(--font-heading);
  font-size: 26px;
  font-weight: 700;
  line-height: 1.7;
  color: var(--ink-light);
  text-align: center;

  50% { opacity: 1; transform: translateX(-50%) translateY(5px); }
}

/* 封底 */
.back-content {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;

}

/* ========== 星空 ========== */
.stars {
  position: absolute;
  inset: 0;
  overflow: hidden;
  pointer-events: none;
  z-index: 1;
}
.star {
  position: absolute;
  background: #fff;
  border-radius: 50%;

}
.star.normal { width: 1.5px; height: 1.5px; opacity: 0.6; }

.star.mint { background: var(--accent-mint); box-shadow: 0 0 5px var(--accent-mint); width: 2px; height: 2px; }
@keyframes twinkle {
  0%, 100% { opacity: 0.35; }
  50% { opacity: 1; }
}
.shooting-star {
  position: absolute;
  width: 90px; height: 1.5px;
  background: linear-gradient(90deg, transparent, #fff);
  border-radius: 1px;
  opacity: 0;
  animation: shoot 9s ease-in infinite;
}
@keyframes shoot {
  0% { transform: translate(-100px, 0) rotate(-25deg); opacity: 0; }
  3% { opacity: 1; }
  18% { transform: translate(420px, 200px) rotate(-25deg); opacity: 0; }
  100% { opacity: 0; }
}

/* ========== 书签（固定不随翻页） ========== */
.bookmark {
  position: absolute;
  top: 0;
  left: 58%;
  width: 30px;
  height: 80px;
  background: linear-gradient(180deg, #ffc0d9 0%, #ff8fb8 100%);

  box-shadow: 0 3px 8px rgba(0,0,0,0.25);
  pointer-events: none;
}

/* ========== 翻页点击区 ========== */
.nav-zone {
  position: absolute;
  top: 0; bottom: 0;
  width: 12%;
  z-index: 40;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
}
.nav-left { left: 0; }
.nav-right { right: 0; }
.nav-zone::after {
  content: '';
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  width: 28px; height: 28px;
  border-radius: 50%;
  background: rgba(255,255,255,0.08);

  transition: opacity 0.2s;
}
.nav-zone:hover::after { opacity: 1; }
.nav-zone::before {

  transform: translate(-50%, -50%);

  color: rgba(255,255,255,0.5);
  opacity: 0;

}
.nav-zone:hover::before { opacity: 1; }

.nav-right::before { content: '→'; }

/* ========== 页码 + 进度条 ========== */

/* ========== 第 4 页 靠近层 chips ========== */

/* ========== XSS 防护：转义用户输入 ========== */
function escapeHtml(str) {
  if (str == null) return '';
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}
// 用户输入统一用 textContent 写入，进一步防 XSS
function setText(el, text) {
  if (el) el.textContent = text == null ? '' : String(text);
}

/* ========== Mock 数据：帮你说 5 场景 ========== */

/* 帮你说场景匹配：先精确匹配 raw，再走关键词 */
function matchSayScenario(input) {
  var text = (input || '').trim();
  // 1. 精确匹配 raw
  for (var key in SAY_SCENARIOS) {

/* 帮你懂场景匹配：先精确匹配 raw，再走关键词 */
function matchUnderstandScenario(input) {
  var text = (input || '').trim();
  for (var key in UNDERSTAND_SCENARIOS) {
    if (UNDERSTAND_SCENARIOS[key].raw === text) return UNDERSTAND_SCENARIOS[key];
  }
  if (/吵|不说话/.test(text)) return UNDERSTAND_SCENARIOS.quarrel;
  if (/冷淡|冷/.test(text)) return UNDERSTAND_SCENARIOS.cold;
  if (/误会|解释/.test(text)) return UNDERSTAND_SCENARIOS.misunderstanding;
  if (/生气|气/.test(text)) return UNDERSTAND_SCENARIOS.angry;

}

/* ========== 翻页书核心：状态管理 ========== */
var totalPages = 6;
var currentPage = 1;
var isFlipping = false;
var pages = Array.prototype.slice.call(document.querySelectorAll('.page'));
var pageNumEl = document.getElementById('pageNum');
var progressFill = document.getElementById('progressFill');

/* 更新 z-index：未翻页按页码倒序（首页最高），已翻页按页码正序 */
function updateZIndices() {
  pages.forEach(function(p, i) {
    var n = i + 1;
    if (p.classList.contains('flipped')) {
      p.style.zIndex = n * 2 - 1; // 已翻：1,3,5,7,9,11
    } else {
      p.style.zIndex = (totalPages - n + 1) * 2; // 未翻：12,10,8,6,4,2
    }
  });
}

/* 更新当前页标记（用于页角微卷） */
function updateCurrentMark() {
  pages.forEach(function(p) {
    p.classList.toggle('current', parseInt(p.dataset.page, 10) === currentPage);
  });
}

/* 更新页码 + 进度条 */
function updatePageNum() {
  pageNumEl.textContent = currentPage + ' / ' + totalPages;
  progressFill.style.width = (currentPage / totalPages * 100) + '%';
}

/* 翻到指定页（防抖） */
function flipToPage(target) {
  if (isFlipping) return;
  if (target < 1 || target > totalPages || target === currentPage) return;
  isFlipping = true;

  if (target > currentPage) {
    // 向后翻：把当前到目标前一页全部翻
    for (var i = currentPage; i < target; i++) {
      pages[i - 1].classList.add('flipped');
    }
  } else {
    // 向前翻：把目标页到当前前一页全部翻回来
    for (var j = target; j < currentPage; j++) {
      pages[j - 1].classList.remove('flipped');
    }
  }

  currentPage = target;
  updateZIndices();
  updateCurrentMark();
  updatePageNum();

  // 翻页完成后释放防抖（0.7s 翻页 + 50ms 缓冲）
  setTimeout(function() { isFlipping = false; }, 750);
}

function nextPage() { flipToPage(currentPage + 1); }
function prevPage() { flipToPage(currentPage - 1); }

/* ========== 翻页交互绑定 ========== */
document.getElementById('navLeft').addEventListener('click', prevPage);
document.getElementById('navRight').addEventListener('click', nextPage);

/* 键盘 ←/→/Space */
document.addEventListener('keydown', function(e) {
  if (e.key === 'ArrowLeft') { e.preventDefault(); prevPage(); }
  else if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); nextPage(); }
});

/* 触摸滑动（避开交互元素） */
var touchStartX = 0, touchStartY = 0, swipeEnabled = true;
var bookStage = document.querySelector('.book-stage');
bookStage.addEventListener('touchstart', function(e) {
  var t = e.target;
  var tag = (t.tagName || '').toLowerCase();
  if (tag === 'textarea' || tag === 'input' || tag === 'button' ||
      (t.closest && (t.closest('button') || t.closest('.chip') ||
                     t.closest('.scenario-chip') || t.closest('.approach-chip') ||
                     t.closest('textarea') || t.closest('.mint-card')))) {
    swipeEnabled = false;
    return;
  }
  swipeEnabled = true;
  touchStartX = e.touches[0].clientX;
  touchStartY = e.touches[0].clientY;
}, { passive: true });

bookStage.addEventListener('touchend', function(e) {
  if (!swipeEnabled) return;
  var dx = e.changedTouches[0].clientX - touchStartX;
  var dy = e.changedTouches[0].clientY - touchStartY;
  if (Math.abs(dx) > 50 && Math.abs(dx) > Math.abs(dy)) {
    if (dx < 0) nextPage();
    else prevPage();
  }
}, { passive: true });

  var cardRect = deliverCard.getBoundingClientRect();
  var cx = cardRect.left - stageRect.left + cardRect.width / 2;
  var cy = cardRect.top - stageRect.top + cardRect.height / 2;

    var dy = Math.sin(angle) * dist - 70; // 整体偏上飞

      { transform: 'translate(' + dx + 'px, ' + dy + 'px) scale(0.2)', opacity: 0 }
    ], {
      duration: dur,
      easing: 'cubic-bezier(0.2, 0.6, 0.4, 1)',
      fill: 'forwards'
    });

  html += '<div class="moment-photo">';
  html += '<div class="moment-photo-img" style="background:' + data.ta.color + ';"></div>';
  html += '<div class="moment-photo-info"><div class="moment-photo-role" style="color:var(--accent-rose);">Ta</div><div class="moment-photo-note">' + escapeHtml(data.ta.note) + '</div></div>';
  html += '</div>';
  html += '</div>';
  return html;
}

function renderReviewPreview(data) {
  var html = '<div class="preview-head"><div class="preview-title">月度回顾</div><div class="preview-sub">这个月，你们一起走过的路</div></div>';
  html += '<div class="review-stats">';
  data.stats.forEach(function(s) {
    html += '<div class="review-stat"><div class="review-num">' + s.num + '</div><div class="review-label">' + escapeHtml(s.label) + '</div></div>';
  });
  html += '</div>';
  html += '<div class="review-summary">' + escapeHtml(data.summary) + '</div>';
  return html;
}

/* 统一入口：根据 key 渲染对应预览 */
function renderFeaturePreview(key) {
  var preview = FEATURE_PREVIEWS[key];
  if (!preview) return;
  var html = '';
  switch (preview.type) {
    case 'glimmer':   html = renderGlimmerPreview(preview.data); break;
    case 'question':  html = renderQuestionPreview(preview.data); break;
    case 'challenge': html = renderChallengePreview(preview.data); break;
    case 'moment':    html = renderMomentPreview(preview.data); break;
    case 'review':    html = renderReviewPreview(preview.data); break;
  }
  featurePreview.innerHTML = html;
  featurePreview.classList.add('show');
}

document.getElementById('backHome').addEventListener('click', function(e) {
  e.preventDefault();
  flipToPage(1);
});

// 防止 textarea 等交互元素的点击事件冒泡到 nav-zone
['sayInput', 'understandInput', 'sayPolishBtn', 'understandBtn',
 'saySendBtn', 'deliverContinueBtn', 'understandContinueBtn', 'sendBtn',
 'coverHint', 'backHome'].forEach(function(id) {
  var el = document.getElementById(id);
  if (el) {
    el.addEventListener('click', function(e) { e.stopPropagation(); });
  }
});
// chips / scenario-chips / approach-chips 也阻止冒泡
document.querySelectorAll('.chip, .scenario-chip, .approach-chip, .feature-card, .mint-card, .back-link').forEach(function(el) {
  el.addEventListener('click', function(e) { e.stopPropagation(); });
});
