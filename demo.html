<style>
/* ========== 字体引用 ========== */
@font-face {
  font-family: 'WorkSans';
  src: url('./_shared/fonts/WorkSans-Regular.ttf') format('truetype');
  font-weight: 400; font-style: normal;
}
@font-face {
  font-family: 'WorkSans';
  src: url('./_shared/fonts/WorkSans-Bold.ttf') format('truetype');
  font-weight: 700; font-style: normal;
}

/* ========== 星夜呢喃配色 CSS 变量 ========== */
:root {
  --bg: #0f0a1e;
  --bg2: #1a1233;
  --card: #221a3d;
  --ink: #f0eaff;
  --ink2: #c8b8e8;
  --muted: #8478a8;
  --rule: #2e2455;
  --accent: #a8e6cf;
  --accent-soft: #7ed4b3;
  --accent-light: #1e2a25;
  --accent2: #ffd6e8;
  --accent2-light: #2a1e2a;
  --shadow-sm: 0 1px 3px rgba(0, 0, 0, 0.4);
  --shadow-md: 0 4px 16px rgba(0, 0, 0, 0.45);
  --shadow-lg: 0 12px 40px rgba(0, 0, 0, 0.55);
  --radius-sm: 10px;
  --radius-md: 14px;
  --radius-lg: 16px;
  --font-heading: 'WorkSans', 'PingFang SC', 'Noto Sans CJK SC', 'Microsoft YaHei', sans-serif;
  --font-body: 'PingFang SC', 'Noto Sans CJK SC', 'Microsoft YaHei', sans-serif;
}

/* ========== 重置与基础 ========== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  font-family: var(--font-body);
  background: var(--bg);
  color: var(--ink);
  line-height: 1.7;
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
  overflow-x: hidden;
}

/* ========== 星空背景（全页固定） ========== */
.starfield {
  position: fixed;
  inset: 0;
  z-index: 0;
  overflow: hidden;
  pointer-events: none;
  background:
    radial-gradient(ellipse at 20% 0%, rgba(168, 230, 207, 0.06) 0%, transparent 50%),
    radial-gradient(ellipse at 80% 100%, rgba(255, 214, 232, 0.05) 0%, transparent 50%),
    var(--bg);
}
.starfield .star {
  position: absolute;
  width: 2px;
  height: 2px;
  background: #fff;
  border-radius: 50%;
  opacity: 0.6;
  animation: twinkle 3s ease-in-out infinite;
}
.starfield .star.big {
  width: 3px;
  height: 3px;
  box-shadow: 0 0 6px rgba(255, 255, 255, 0.8);
}
.starfield .star.pink {
  background: #ffd6e8;
  box-shadow: 0 0 6px rgba(255, 214, 232, 0.7);
}
.starfield .star.mint {
  background: #a8e6cf;
  box-shadow: 0 0 6px rgba(168, 230, 207, 0.7);
}
@keyframes twinkle {
  0%, 100% { opacity: 0.2; transform: scale(0.8); }
  50% { opacity: 0.9; transform: scale(1.2); }
}
/* 流星 */
.shooting-star {
  position: absolute;
  top: 10%;
  left: -50px;
  width: 80px;
  height: 1px;
  background: linear-gradient(90deg, transparent, #fff, transparent);
  opacity: 0;
  animation: shoot 9s ease-in infinite;
}
@keyframes shoot {
  0% { transform: translate(0, 0) rotate(15deg); opacity: 0; }
  4% { opacity: 1; }
  18% { transform: translate(420px, 130px) rotate(15deg); opacity: 0; }
  100% { transform: translate(420px, 130px) rotate(15deg); opacity: 0; }
}

/* ========== 主容器：移动端优先居中 ========== */
.demo-page {
  position: relative;
  z-index: 1;
  max-width: 480px;
  margin: 0 auto;
  padding: 0 18px 0;
}

/* ========== 顶栏（粘性） ========== */
.top-bar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 16px 0 12px;
  position: sticky;
  top: 0;
  background: rgba(15, 10, 30, 0.78);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  z-index: 30;
  border-bottom: 1px solid rgba(46, 36, 85, 0.5);
}
.top-bar .back-link {
  font-size: 0.78rem;
  color: var(--muted);
  text-decoration: none;
  display: flex;
  align-items: center;
  gap: 4px;
  transition: color 0.3s ease;
  flex: 0 0 auto;
}
.top-bar .back-link:hover { color: var(--accent); }
.top-bar .title {
  font-family: var(--font-heading);
  font-size: 1rem;
  font-weight: 700;
  color: var(--ink);
  letter-spacing: 0.04em;
  flex: 1;
  text-align: center;
}
.top-bar .title .dot { color: var(--accent); }
.role-switch {
  font-size: 0.76rem;
  font-weight: 600;
  color: var(--accent2);
  background: var(--accent2-light);
  border: 1px solid var(--accent2);
  border-radius: 100px;
  padding: 7px 14px;
  cursor: pointer;
  font-family: var(--font-body);
  transition: all 0.3s ease;
  flex: 0 0 auto;
  white-space: nowrap;
}
.role-switch:hover {
  background: var(--accent2);
  color: #fff;
}

/* ========== 章节容器 ========== */
.chapter {
  position: relative;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  padding: 86px 0 40px;
}
/* 章节标题 */
.chapter-head {
  text-align: center;
  margin-bottom: 28px;
  opacity: 0;
  transform: translateY(30px);
  transition: opacity 0.9s ease, transform 0.9s ease;
}
.chapter-head.visible {
  opacity: 1;
  transform: translateY(0);
}
.chapter-title {
  font-family: var(--font-heading);
  font-size: 2.5rem;
  font-weight: 700;
  letter-spacing: 0.12em;
  line-height: 1.1;
  background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 100%);
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
  margin-bottom: 8px;
}
.chapter-subtitle {
  font-size: 0.86rem;
  color: var(--muted);
  letter-spacing: 0.08em;
}

/* ========== 章节过渡分隔 ========== */
.chapter-divider {
  position: relative;
  min-height: 30vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 20px 0;
  gap: 14px;
}
.chapter-divider .divider-line {
  width: 60%;
  max-width: 240px;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--accent-soft), transparent);
  opacity: 0.6;
}
.chapter-divider .divider-text {
  font-size: 0.84rem;
  color: var(--muted);
  font-style: italic;
  letter-spacing: 0.06em;
  line-height: 1.8;
  max-width: 280px;
}
.chapter-divider .divider-svg {
  width: 24px;
  height: 24px;
  opacity: 0.5;
  color: var(--accent);
}

/* ========== 通用卡片（毛玻璃升级） ========== */
.card {
  position: relative;
  background: rgba(34, 26, 61, 0.55);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border: 1px solid rgba(168, 230, 207, 0.1);
  border-radius: var(--radius-md);
  padding: 18px 18px;
  box-shadow: var(--shadow-sm);
  margin-top: 14px;
  transition: border-color 0.35s ease, transform 0.35s ease, box-shadow 0.35s ease;
  /* 进入动画初始态 */
  opacity: 0;
  transform: translateY(30px);
}
.card.visible {
  opacity: 1;
  transform: translateY(0);
  transition: opacity 0.8s ease, transform 0.8s ease, border-color 0.35s ease, box-shadow 0.35s ease;
}
.card:hover {
  border-color: rgba(168, 230, 207, 0.32);
  transform: translateY(-4px);
  box-shadow: var(--shadow-md);
}
.card.visible:hover {
  /* hover 优先级：可见后才能上浮 */
  transform: translateY(-4px);
}
.card-tag {
  display: inline-block;
  font-size: 0.68rem;
  font-weight: 700;
  letter-spacing: 0.14em;
  color: var(--accent);
  font-family: var(--font-heading);
  background: var(--accent-light);
  padding: 4px 12px;
  border-radius: 100px;
  margin-bottom: 10px;
  text-transform: uppercase;
  box-shadow: 0 0 10px rgba(168, 230, 207, 0.18);
}
.card-tag.green {
  color: var(--accent2);
  background: var(--accent2-light);
  box-shadow: 0 0 10px rgba(255, 214, 232, 0.18);
}
.card-title {
  font-family: var(--font-heading);
  font-size: 1.02rem;
  font-weight: 700;
  color: var(--ink);
  margin-bottom: 10px;
  line-height: 1.5;
}

/* ========== 每日小签 ========== */
.sign-card {
  text-align: center;
  border-left: 3px solid var(--accent);
}
.sign-text {
  font-size: 1.06rem;
  color: var(--ink);
  line-height: 1.85;
  font-weight: 500;
  padding: 4px 6px 2px;
}

/* ========== 微光（现在的我 / 现在的Ta） ========== */
.glimmer-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  margin-top: 14px;
}
.glimmer-card {
  position: relative;
  background: rgba(34, 26, 61, 0.55);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border: 1px solid rgba(168, 230, 207, 0.1);
  border-radius: var(--radius-md);
  padding: 16px 14px;
  text-align: center;
  box-shadow: var(--shadow-sm);
  transition: all 0.35s ease;
  /* 进入动画初始态 */
  opacity: 0;
  transform: translateY(30px);
}
.glimmer-card.visible {
  opacity: 1;
  transform: translateY(0);
  transition: opacity 0.8s ease, transform 0.8s ease, border-color 0.35s ease, box-shadow 0.35s ease;
}
.glimmer-card.self {
  border-color: var(--accent-soft);
  animation: breathe 3s ease-in-out infinite;
}
.glimmer-card.other {
  opacity: 0.92;
}
.glimmer-card.visible.other {
  opacity: 0.92;
}
@keyframes breathe {
  0%, 100% { box-shadow: 0 2px 12px rgba(126, 212, 179, 0.08); }
  50% { box-shadow: 0 4px 24px rgba(126, 212, 179, 0.28); }
}
.g-avatar {
  width: 38px; height: 38px;
  border-radius: 50%;
  margin: 0 auto 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.78rem;
  font-weight: 700;
  color: #fff;
}
.g-avatar.me { background: #a8e6cf; }
.g-avatar.ta { background: #ffd6e8; }
.g-name {
  font-size: 0.82rem;
  font-weight: 600;
  color: var(--ink2);
  margin-bottom: 6px;
}
.g-status {
  font-size: 0.84rem;
  font-weight: 600;
  color: var(--ink);
  margin-bottom: 8px;
}
.g-text {
  font-size: 0.82rem;
  color: var(--ink2);
  line-height: 1.7;
  background: rgba(26, 18, 51, 0.7);
  border-radius: var(--radius-sm);
  padding: 10px 10px;
  min-height: 48px;
  display: flex;
  align-items: center;
  justify-content: center;
}
.g-time {
  font-size: 0.68rem;
  color: var(--muted);
  font-family: var(--font-heading);
  text-align: right;
  margin-top: 8px;
}

/* ========== 回答 / 分享区块 ========== */
.ans-block {
  background: rgba(26, 18, 51, 0.7);
  border-radius: var(--radius-sm);
  padding: 12px 14px;
  margin-top: 10px;
  border: 1px solid transparent;
  transition: all 0.35s ease;
}
.ans-block.self {
  border-color: var(--accent-soft);
  background: var(--accent-light);
}
.ans-block.other {
  opacity: 0.45;
}
.ans-label {
  font-size: 0.74rem;
  font-weight: 700;
  letter-spacing: 0.06em;
  margin-bottom: 4px;
  font-family: var(--font-heading);
  display: flex;
  align-items: center;
  gap: 5px;
}
.ans-label.self { color: var(--accent); }
.ans-label.other { color: var(--muted); }
.ans-label .av-mini {
  width: 16px; height: 16px;
  border-radius: 50%;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  font-size: 0.55rem;
  color: #fff;
  font-weight: 700;
}
.ans-label .av-mini.me { background: #a8e6cf; }
.ans-label .av-mini.ta { background: #ffd6e8; }
.ans-text {
  font-size: 0.86rem;
  color: var(--ink);
  line-height: 1.75;
}
.ans-block.other .ans-text { color: var(--ink2); }

/* ========== 默契挑战 ========== */
.telepathy-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-top: 10px;
}
.tele-cell {
  background: rgba(26, 18, 51, 0.7);
  border-radius: var(--radius-sm);
  padding: 12px 12px;
  text-align: center;
}
.tele-cell .tele-label {
  font-size: 0.7rem;
  color: var(--muted);
  margin-bottom: 4px;
  letter-spacing: 0.04em;
}
.tele-cell .tele-value {
  font-size: 0.98rem;
  font-weight: 600;
  color: var(--ink);
}
.tele-actual {
  margin-top: 10px;
  background: var(--accent2-light);
  border: 1px dashed var(--accent2);
  border-radius: var(--radius-sm);
  padding: 10px 14px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
}
.tele-actual .ta-label {
  font-size: 0.74rem;
  color: var(--accent2);
  font-weight: 600;
}
.tele-actual .ta-values {
  font-size: 0.82rem;
  color: var(--ink2);
}
.tele-actual .ta-values b { color: var(--ink); font-weight: 600; }
.tele-result {
  margin-top: 10px;
  font-size: 0.78rem;
  color: var(--muted);
  text-align: center;
  font-style: italic;
}

/* ========== 轻声说（AI 辅助模块） ========== */
.whisper-card .tabs {
  display: flex;
  gap: 8px;
  margin-bottom: 14px;
}
.whisper-card .tab {
  padding: 8px 18px;
  border-radius: 100px;
  font-size: 0.82rem;
  font-weight: 600;
  cursor: pointer;
  border: 1px solid var(--rule);
  background: transparent;
  color: var(--muted);
  transition: all 0.3s ease;
  font-family: var(--font-body);
}
.whisper-card .tab.active {
  background: var(--accent);
  color: #fff;
  border-color: var(--accent);
  box-shadow: 0 0 12px rgba(168, 230, 207, 0.25);
}
.whisper-card .tab:hover:not(.active) {
  border-color: var(--accent-soft);
  color: var(--accent);
}
.whisper-card .panel { display: none; }
.whisper-card .panel.active { display: block; animation: fadeInUp 0.4s ease; }
.whisper-card .textarea {
  width: 100%;
  min-height: 96px;
  border: 1px solid var(--rule);
  border-radius: var(--radius-md);
  padding: 14px;
  font-size: 0.86rem;
  font-family: var(--font-body);
  color: var(--ink);
  background: rgba(15, 10, 30, 0.6);
  resize: vertical;
  line-height: 1.7;
  transition: border-color 0.3s ease, box-shadow 0.3s ease;
}
.whisper-card .textarea:focus {
  outline: none;
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(168, 230, 207, 0.08);
}
.whisper-card .textarea::placeholder { color: var(--muted); opacity: 0.55; }
.whisper-card .scene-chips {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-top: 12px;
}
.whisper-card .scene-chip {
  padding: 6px 12px;
  border-radius: 100px;
  font-size: 0.76rem;
  color: var(--ink2);
  background: rgba(34, 26, 61, 0.6);
  border: 1px solid var(--rule);
  cursor: pointer;
  transition: all 0.3s ease;
  font-family: var(--font-body);
}
.whisper-card .scene-chip:hover {
  border-color: var(--accent-soft);
  background: var(--accent-light);
  color: var(--accent);
}
.whisper-card .btn-row {
  display: flex;
  justify-content: flex-end;
  margin-top: 14px;
}
.whisper-card .btn-polish {
  padding: 9px 22px;
  border-radius: 100px;
  font-size: 0.86rem;
  font-weight: 600;
  cursor: pointer;
  border: none;
  transition: all 0.3s ease;
  font-family: var(--font-body);
  background: var(--accent);
  color: #fff;
  box-shadow: 0 2px 10px rgba(168, 230, 207, 0.2);
}
.whisper-card .btn-polish:hover { background: var(--accent-soft); }
.whisper-card .btn-polish.loading {
  background: var(--muted);
  cursor: wait;
  box-shadow: none;
}
.whisper-card .result {
  background: rgba(26, 18, 51, 0.7);
  border-radius: var(--radius-md);
  padding: 16px;
  margin-top: 14px;
  opacity: 0;
  max-height: 0;
  overflow: hidden;
  transition: opacity 0.6s ease, max-height 0.6s ease, padding 0.6s ease, margin-top 0.6s ease;
}
.whisper-card .result.shown {
  opacity: 1;
  max-height: 800px;
}
.whisper-card .r-label {
  font-size: 0.7rem;
  font-weight: 700;
  color: var(--accent);
  margin-bottom: 6px;
  letter-spacing: 0.06em;
  font-family: var(--font-heading);
  display: flex;
  align-items: center;
  gap: 6px;
}
.whisper-card .r-label.pink { color: var(--accent2); }
.whisper-card .r-text {
  font-size: 0.86rem;
  color: var(--ink2);
  line-height: 1.8;
  margin-bottom: 14px;
}
.whisper-card .r-chips {
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.whisper-card .r-chip {
  background: rgba(34, 26, 61, 0.7);
  border: 1px solid var(--rule);
  border-radius: var(--radius-sm);
  padding: 11px 14px;
  font-size: 0.84rem;
  color: var(--ink);
  cursor: pointer;
  transition: all 0.3s ease;
  line-height: 1.6;
}
.whisper-card .r-chip:hover {
  border-color: var(--accent-soft);
  background: var(--accent-light);
}
.whisper-card .r-chip.copied {
  border-color: var(--accent);
  background: var(--accent-light);
}

/* ========== 此刻予你（拍照） ========== */
.photo-placeholder {
  margin-top: 10px;
  border: 1.5px dashed var(--rule);
  border-radius: var(--radius-md);
  padding: 28px 16px;
  text-align: center;
  color: var(--muted);
  font-size: 0.88rem;
  cursor: pointer;
  transition: all 0.3s ease;
  background: rgba(26, 18, 51, 0.5);
}
.photo-placeholder:hover {
  border-color: var(--accent-soft);
  color: var(--accent);
}
.photo-placeholder .pp-icon { font-size: 1.5rem; display: block; margin-bottom: 6px; }
.photo-history { margin-top: 12px; }
.photo-history .ph-title {
  font-size: 0.74rem;
  color: var(--muted);
  margin-bottom: 8px;
  letter-spacing: 0.04em;
}
.photo-history-item {
  background: rgba(26, 18, 51, 0.7);
  border-radius: var(--radius-sm);
  padding: 10px 12px;
  display: flex;
  align-items: center;
  gap: 10px;
}
.photo-history-item .ph-time {
  font-size: 0.7rem;
  color: var(--muted);
  font-family: var(--font-heading);
  flex-shrink: 0;
}
.photo-history-item .ph-photos {
  display: flex;
  gap: 8px;
  flex: 1;
  flex-wrap: wrap;
}
.ph-photo {
  font-size: 0.78rem;
  color: var(--ink2);
  background: rgba(34, 26, 61, 0.8);
  border: 1px solid var(--rule);
  border-radius: 8px;
  padding: 4px 8px;
  display: inline-flex;
  align-items: center;
  gap: 4px;
}
.ph-photo.self { border-color: var(--accent-soft); color: var(--ink); }
.ph-photo.other { border-color: var(--accent2); color: var(--ink); }
.ph-photo .ph-av {
  width: 14px; height: 14px;
  border-radius: 50%;
  font-size: 0.5rem;
  color: #fff;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  font-weight: 700;
}
.ph-photo .ph-av.me { background: #a8e6cf; }
.ph-photo .ph-av.ta { background: #ffd6e8; }

/* ========== 月度回顾 ========== */
.monthly-stats {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 8px;
  margin-top: 10px;
}
.stat-block {
  background: rgba(26, 18, 51, 0.7);
  border-radius: var(--radius-sm);
  padding: 14px 6px;
  text-align: center;
  border: 1px solid rgba(168, 230, 207, 0.06);
  transition: border-color 0.35s ease;
}
.stat-block:hover { border-color: rgba(168, 230, 207, 0.2); }
.stat-block .stat-value {
  font-family: var(--font-heading);
  font-size: 2rem;
  font-weight: 700;
  color: var(--accent);
  line-height: 1;
  margin-bottom: 4px;
}
.stat-block .stat-label {
  font-size: 0.66rem;
  color: var(--muted);

/* ========== 底部 ========== */

/* ========== 进度指示器（右侧固定） ========== */
.progress-dots {
  position: fixed;
  right: 14px;
  top: 50%;
  transform: translateY(-50%);
  z-index: 40;
  display: flex;
  flex-direction: column;
  gap: 14px;
}
.progress-dots .pdot {

  width: 10px;
  height: 10px;

.progress-dots .pdot.active {

  border-color: var(--accent);

.progress-dots .pdot .ptip {
  position: absolute;

  transform: translateY(-50%);

  pointer-events: none;

.progress-dots .pdot:hover .ptip { opacity: 1; }

/* ========== 通用动画 ========== */
@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(16px); }
  to { opacity: 1; transform: translateY(0); }
}

/* ========== 响应式：超窄屏堆叠 ========== */
@media (max-width: 380px) {

/* 不支持 backdrop-filter 时的兜底 */
@supports not ((backdrop-filter: blur(20px)) or (-webkit-backdrop-filter: blur(20px))) {
  .card, .glimmer-card { background: var(--card); }

</style>

<script>
/* ========================================================
 * 慢慢说 Demo —— 纯前端展示页
 * 3 章分屏滚动 + 轻声说 AI 辅助模块 + 进入动画 + 进度指示器
 * 所有数据写死在 JS 中，不依赖任何后端 / API
 * ====================================================== */

/* ---------- XSS 防护：HTML 转义 ---------- */
function escapeHtml(str) {
  if (str === null || str === undefined) return '';
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

/* ---------- 写死的 Mock 数据（原始 + 新增 whisper） ---------- */
var DATA = {
  // 每日小签
  sign: {
    type: '一句话',
    content: '今天不用很完美，今天你已经在对方心里了。'
  },
  // 两个人的微光（me / ta 各自一份）
  members: {
    me: { emoji: '😊', status: '开心', text: '今天项目终于上线了，第一个想分享的人就是你。', time: '18:30' },
    ta: { emoji: '😌', status: '平静', text: '下午去散步，看到一只橘猫晒太阳，想起了你。', time: '16:45' }
  },
  // 每日一问
  dailyQuestion: {
    question: '你们之间最让你怀念的一个瞬间是什么？',
    me: '上次下雨你没带伞，我跑去接你，两个人淋着雨笑了一路。',
    ta: '你第一次做饭给我吃，虽然有点咸，但你紧张的样子特别可爱。'
  },
  // 默契挑战
  telepathy: {
    question: 'Ta 最喜欢的食物是什么？',
    meGuess: '火锅',    // 我猜 Ta 喜欢
    taGuess: '寿司',    // Ta 猜我喜欢
    meActual: '寿司',   // 我的实际答案
    taActual: '火锅'    // Ta 的实际答案
  },
  // 真心话
  truth: {
    question: '最近一次被 Ta 感动是什么时候？',
    me: '上周我加班到很晚，回家发现你给我留了灯和热好的饭。',
    ta: '你记得我随口说过想吃的每一样东西。'
  },
  // 此刻予你
  photo: {
    theme: '拍一张你此刻看到的光',
    // 历史记录：3 天前两人各拍了一张
    history: [
      { time: '3 天前', me: '窗外的晚霞', ta: '我养的多肉开花了' }
    ]
  },
  // 月度回顾
  monthly: {
    stats: [
      { label: '微光时刻', value: 8 },
      { label: '轻声说', value: 3 },
      { label: '此刻予你', value: 2 },
      { label: '每日一问', value: 7 }
    ],
    summary: '这个月你们一起留下了 20 个温暖瞬间。最常出现的心情是‘平静’。下次见面，可以聊聊那些一起看过的晚霞。'
  },
  // 轻声说（AI 辅助模块，新增）
  whisper: {
    express: {
      placeholder: '把你想说的话写在这里，比如：\n你今天说的那句话让我有点不舒服，但我不是想吵架，我只是不知道该怎么表达...',
      scenes: [
        { label: '最近压力大需要倾诉', text: '最近压力有点大，想跟你说说但又怕你担心' },
        { label: '有件事不知道怎么开口', text: '有件事在我心里很久了，不知道怎么开口跟你说' },
        { label: '想表达感谢但说不出口', text: '其实我一直想谢谢你，但总是不好意思说出口' },
        { label: '想道歉但不知道怎么说', text: '我知道我做错了，想好好跟你道歉' }
      ],
      understanding: '你想表达的是关心，但担心说出口的话会让对方觉得被指责。这很正常——在乎才会小心翼翼。',
      responses: [
        '今天你说那句话的时候，我其实有点难过。不是因为生气，是因为我在乎你怎么看我。我们可以聊聊吗？',
        '我仔细想了想，你可能是无心的。但我还是想告诉你我的感受，因为我觉得我们之间可以说真话。'
      ]
    },
    heal: {
      placeholder: '贴一段聊天记录，或者描述一个场景，比如：\n今天我加班很累，Ta说了一句\'你怎么又加班\'，我突然就不想说话了...',
      scenes: [
        { label: '对方语气不好', text: 'Ta今天说话有点冲，我不知道是不是哪里惹Ta不开心了' },
        { label: '冷战中', text: '我们因为一件小事吵了起来，现在谁都不理谁' },
        { label: '等回复焦虑', text: '我发了消息Ta一直没回，有点焦虑' },
        { label: '我说错话了', text: '我说了一句伤人的话，想道歉但不知道怎么开口' }
      ],
      understanding: '这句话背后，Ta 可能不是在指责你加班，而是在表达"想你了但不知道怎么说"。疲惫的时候人容易用抱怨代替表达。',
      responses: [
        '我知道你是因为想我才这么说。我也想你了，等我忙完这阵子好好陪你。',
        '听到你这么说我有点难过，但我知道你不是故意的。我们都不容易，抱一下？'
      ]
    }
  }
};

/* ---------- 当前视角：'me' 或 'ta' ---------- */
var currentRole = 'me';

/* ---------- 工具：根据当前视角得到 self / other 的 key ---------- */
function selfKey() { return currentRole; }
function otherKey() { return currentRole === 'me' ? 'ta' : 'me'; }

/* ---------- 渲染：每日小签 ---------- */
function renderSign() {
  document.getElementById('signTag').textContent = DATA.sign.type;
  document.getElementById('signText').textContent = DATA.sign.content;
}

/* ---------- 渲染：现在的我 + 现在的Ta ---------- */
function renderGlimmer() {
  var sKey = selfKey();
  var oKey = otherKey();
  var self = DATA.members[sKey];
  var other = DATA.members[oKey];

  // 「现在的我」放当前视角的人，「现在的Ta」放对方；切换视角时内容互换
  var html = '' +
    '<div class="glimmer-card self reveal">' +
      '<div class="g-avatar ' + (sKey === 'me' ? 'me' : 'ta') + '">' + (sKey === 'me' ? '我' : 'Ta') + '</div>' +
      '<div class="g-name">现在的我</div>' +
      '<div class="g-status">' + escapeHtml(self.emoji) + ' ' + escapeHtml(self.status) + '</div>' +
      '<div class="g-text">' + escapeHtml(self.text) + '</div>' +
      '<div class="g-time">' + escapeHtml(self.time) + '</div>' +
    '</div>' +
    '<div class="glimmer-card other reveal">' +
      '<div class="g-avatar ' + (oKey === 'me' ? 'me' : 'ta') + '">' + (oKey === 'me' ? '我' : 'Ta') + '</div>' +
      '<div class="g-name">现在的 Ta</div>' +
      '<div class="g-status">' + escapeHtml(other.emoji) + ' ' + escapeHtml(other.status) + '</div>' +
      '<div class="g-text">' + escapeHtml(other.text) + '</div>' +
      '<div class="g-time">' + escapeHtml(other.time) + '</div>' +
    '</div>';
  var grid = document.getElementById('glimmerGrid');
  grid.innerHTML = html;
  // 重新观察新生成的卡片以触发进入动画
  observeReveal(grid.querySelectorAll('.reveal'));
}

/* ---------- 渲染：每日一问 ---------- */
function renderDailyQ() {
  var dq = DATA.dailyQuestion;
  document.getElementById('dailyQQ').textContent = dq.question;

  var sKey = selfKey();
  var oKey = otherKey();
  // 当前视角的回答高亮，对方的半透明（表示「Ta 已经回答了」）
  var html =
    answerBlock('self', sKey, dq[sKey], 'answer') +
    answerBlock('other', oKey, dq[oKey], 'answer');
  document.getElementById('dailyQAnswers').innerHTML = html;
}

/* ---------- 渲染：默契挑战 ---------- */
function renderTelepathy() {
  var tp = DATA.telepathy;
  document.getElementById('telepathyQ').textContent = tp.question;

  var sKey = selfKey();
  var oKey = otherKey();
  // 「我猜 Ta 喜欢」= 当前视角的人的猜测
  var selfGuess = sKey === 'me' ? tp.meGuess : tp.taGuess;
  var otherGuess = oKey === 'me' ? tp.meGuess : tp.taGuess;
  // 实际答案：当前视角的人的实际答案 / 对方的实际答案
  var selfActual = sKey === 'me' ? tp.meActual : tp.taActual;
  var otherActual = oKey === 'me' ? tp.meActual : tp.taActual;

  var rowHtml =
    '<div class="tele-cell">' +
      '<div class="tele-label">我猜 Ta 喜欢</div>' +
      '<div class="tele-value">' + escapeHtml(selfGuess) + '</div>' +
    '</div>' +
    '<div class="tele-cell">' +
      '<div class="tele-label">Ta 猜我喜欢</div>' +
      '<div class="tele-value">' + escapeHtml(otherGuess) + '</div>' +
    '</div>';
  document.getElementById('telepathyRow').innerHTML = rowHtml;

  var actualHtml =
    '<span class="ta-label">实际答案</span>' +
    '<span class="ta-values">我喜欢 <b>' + escapeHtml(selfActual) + '</b> · Ta 喜欢 <b>' + escapeHtml(otherActual) + '</b></span>';
  document.getElementById('telepathyActual').innerHTML = actualHtml;

  // 两人都猜错 → 制造趣味
  var selfCorrect = (selfGuess === otherActual);   // 我猜的 == Ta 实际喜欢的
  var otherCorrect = (otherGuess === selfActual);  // Ta 猜的 == 我实际喜欢的
  var resultText;
  if (!selfCorrect && !otherCorrect) {
    resultText = '你们都猜错啦 —— 但这样才有更多了解彼此的空间 ✨';
  } else if (selfCorrect && otherCorrect) {
    resultText = '默契满分！你们真的很懂对方 🎉';
  } else if (selfCorrect) {
    resultText = '你猜对了 Ta，但 Ta 还没那么懂你 🙂';
  } else {
    resultText = 'Ta 比你更懂你 🙂';
  }
  document.getElementById('telepathyResult').textContent = resultText;
}

/* ---------- 渲染：真心话 ---------- */
function renderTruth() {
  var tr = DATA.truth;
  document.getElementById('truthQ').textContent = tr.question;

  var sKey = selfKey();
  var oKey = otherKey();
  var html =
    answerBlock('self', sKey, tr[sKey], 'share') +
    answerBlock('other', oKey, tr[oKey], 'share');
  document.getElementById('truthAnswers').innerHTML = html;
}

/* ---------- 通用：回答 / 分享区块 ---------- */
// kind: 'self' 高亮 | 'other' 半透明；labelType: 'answer' 回答 | 'share' 分享
function answerBlock(kind, roleKey, text, labelType) {
  var noun = labelType === 'share' ? '分享' : '回答';
  var label = roleKey === 'me' ? ('我的' + noun) : ('Ta 的' + noun);
  return '' +
    '<div class="ans-block ' + kind + '">' +
      '<div class="ans-label ' + kind + '">' +
        '<span class="av-mini ' + (roleKey === 'me' ? 'me' : 'ta') + '">' + (roleKey === 'me' ? '我' : 'Ta') + '</span>' +
        '<span>' + escapeHtml(label) + '</span>' +
      '</div>' +
      '<div class="ans-text">' + escapeHtml(text) + '</div>' +
    '</div>';
}

/* ---------- 渲染：此刻予你 ---------- */
function renderPhoto() {
  document.getElementById('photoTheme').textContent = DATA.photo.theme;

  var sKey = selfKey();
  var oKey = otherKey();
  var h = DATA.photo.history[0];
  // 历史记录中两人各拍一张，按当前视角标注哪张是「我」、哪张是「Ta」
  // 约定：原始数据里 me 字段是「我」拍的，ta 字段是「Ta」拍的；切换视角时标签互换
  var selfPhoto = sKey === 'me' ? h.me : h.ta;
  var otherPhoto = oKey === 'me' ? h.me : h.ta;

  var html =
    '<div class="ph-title">历史记录</div>' +
    '<div class="photo-history-item">' +
      '<span class="ph-time">' + escapeHtml(h.time) + '</span>' +
      '<div class="ph-photos">' +
        '<span class="ph-photo self">' +
          '<span class="ph-av ' + (sKey === 'me' ? 'me' : 'ta') + '">' + (sKey === 'me' ? '我' : 'Ta') + '</span>' +
          escapeHtml(selfPhoto) +
        '</span>' +
        '<span class="ph-photo other">' +
          '<span class="ph-av ' + (oKey === 'me' ? 'me' : 'ta') + '">' + (oKey === 'me' ? '我' : 'Ta') + '</span>' +
          escapeHtml(otherPhoto) +
        '</span>' +
      '</div>' +

}

/* ---------- 渲染：月度回顾（含数字动画） ---------- */
var monthlyAnimated = false; // 是否已触发过数字滚动
function renderMonthly() {
  var statsHtml = DATA.monthly.stats.map(function(s, idx) {
    return '' +
      '<div class="stat-block">' +
        '<div class="stat-value" data-target="' + s.value + '" data-animated="0">0</div>' +
        '<div class="stat-label">' + escapeHtml(s.label) + '</div>' +
      '</div>';
  }).join('');
  document.getElementById('monthlyStats').innerHTML = statsHtml;
  document.getElementById('monthlySummary').textContent = DATA.monthly.summary;
  monthlyAnimated = false; // 重置以便再次触发
}

/* ---------- 月度数字滚动动画（0 → 目标值） ---------- */
function animateMonthlyNumbers() {
  if (monthlyAnimated) return;
  monthlyAnimated = true;
  var nodes = document.querySelectorAll('#monthlyStats .stat-value');
  nodes.forEach(function(node) {
    var target = parseInt(node.getAttribute('data-target'), 10) || 0;
    var start = 0;
    var duration = 1100;
    var startTime = null;
    function step(ts) {
      if (!startTime) startTime = ts;
      var progress = Math.min((ts - startTime) / duration, 1);
      // easeOutCubic
      var eased = 1 - Math.pow(1 - progress, 3);
      var val = Math.round(start + (target - start) * eased);
      node.textContent = val;
      if (progress < 1) {
        requestAnimationFrame(step);
      } else {
        node.textContent = target;
      }
    }
    requestAnimationFrame(step);
  });
}

/* ---------- 统一渲染所有模块 ---------- */
function renderAll() {
  renderSign();
  renderGlimmer();
  renderDailyQ();
  renderTelepathy();
  renderTruth();
  renderPhoto();
  renderMonthly();

  // 更新视角切换按钮文案
  var btn = document.getElementById('roleSwitch');
  btn.textContent = currentRole === 'me' ? '切换为 Ta' : '切换为我';
}

/* ---------- 切换视角 ---------- */
function switchRole() {
  currentRole = (currentRole === 'me') ? 'ta' : 'me';
  renderAll();
}

/* ========================================================
 * 轻声说（AI 辅助模块）逻辑
 * ====================================================== */
var currentWhisperTab = 'express';

/* 渲染场景 chips */
function renderWhisperScenes(tab) {
  var data = DATA.whisper[tab];
  var html = data.scenes.map(function(sc) {
    // 先把 sc.text 转成 JS 字符串字面量（带引号），再 HTML 转义以安全嵌入 onclick 属性
    var attrValue = escapeHtml(JSON.stringify(sc.text));
    return '<span class="scene-chip" onclick="fillWhisperScene(\'' + tab + '\', ' +
      attrValue + ')">' + escapeHtml(sc.label) + '</span>';
  }).join('');
  document.getElementById(tab + 'Chips').innerHTML = html;
  // 同步占位符
  var ta = document.getElementById(tab + 'Input');
  if (ta) ta.setAttribute('placeholder', data.placeholder);
}

/* 切换 Tab */
function switchWhisperTab(tab) {
  currentWhisperTab = tab;
  document.querySelectorAll('.whisper-card .tab').forEach(function(t) { t.classList.remove('active'); });
  document.querySelectorAll('.whisper-card .panel').forEach(function(p) { p.classList.remove('active'); });
  if (tab === 'express') {
    document.getElementById('wtabExpress').classList.add('active');
    document.getElementById('panelExpress').classList.add('active');
  } else {
    document.getElementById('wtabHeal').classList.add('active');
    document.getElementById('panelHeal').classList.add('active');
  }
}

/* 场景 chip 填入输入框 */
function fillWhisperScene(tab, text) {
  var el = document.getElementById(tab + 'Input');
  el.value = text;
  el.focus();
}

/* 点击「帮我润色」—— 1s 假加载后显示结果 */
function polishWhisper(tab, btn) {
  var result = document.getElementById(tab + 'Result');
  // 防止重复点击时打断动画
  if (btn.classList.contains('loading')) return;

  btn.classList.add('loading');
  var originalText = btn.textContent;
  btn.textContent = '生成中...';

  // 先收起结果区，制造「重新生成」的真实感
  result.classList.remove('shown');

  setTimeout(function() {
    // 填充结果数据
    var data = DATA.whisper[tab];
    document.getElementById(tab + 'Understanding').textContent = data.understanding;
    var chipsHtml = data.responses.map(function(r) {
      var attrValue = escapeHtml(JSON.stringify(r));
      return '<div class="r-chip" onclick="copyWhisperChip(this, ' +
        attrValue + ')" title="点击复制">' + escapeHtml(r) + '</div>';
    }).join('');
    document.getElementById(tab + 'Responses').innerHTML = chipsHtml;

    // 触发淡入
    result.classList.add('shown');
    btn.classList.remove('loading');
    btn.textContent = originalText;
  }, 1000);
}

/* 点击回应层 chip 复制文案 */
function copyWhisperChip(node, text) {
  // 简单复制：优先用 Clipboard API，兜底用 textarea
  var markCopied = function() {
    node.classList.add('copied');
    var original = node.textContent;
    node.textContent = '✓ 已复制到剪贴板';
    setTimeout(function() {
      node.classList.remove('copied');
      node.textContent = original;
    }, 1400);
  };
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(markCopied).catch(function() {
      fallbackCopy(text); markCopied();
    });
  } else {
    fallbackCopy(text); markCopied();
  }
}
function fallbackCopy(text) {
  var ta = document.createElement('textarea');
  ta.value = text;
  ta.style.position = 'fixed';
  ta.style.opacity = '0';
  document.body.appendChild(ta);
  ta.select();
  try { document.execCommand('copy'); } catch (e) {}
  document.body.removeChild(ta);
}

/* ========================================================
 * 星空背景生成（60 小星 + 8 大星 + 6 粉 + 6 薄荷 + 2 流星）

(function generateStarfield() {

  var counts = { '': 60, 'big': 8, 'pink': 6, 'mint': 6 };
  Object.keys(counts).forEach(function(type) {

})();

/* ========================================================
 * 进入动画：IntersectionObserver 检测元素进入视口
 * 兼容性兜底：不支持时直接全部 visible
 * ====================================================== */
var revealObserver = null;
function observeReveal(nodes) {
  if (!nodes || !nodes.length) return;
  if (!revealObserver) {
    if (!('IntersectionObserver' in window)) {
      // 兜底
      nodes.forEach(function(n) { n.classList.add('visible'); });
      return;
    }
    revealObserver = new IntersectionObserver(function(entries) {
      entries.forEach(function(entry) {
        if (entry.isIntersecting) {
          entry.target.classList.add('visible');
          revealObserver.unobserve(entry.target);
        }
      });
    }, { threshold: 0.12, rootMargin: '0px 0px -8% 0px' });
  }
  nodes.forEach(function(n) { revealObserver.observe(n); });
}

/* ========================================================
 * 章节标题进入动画 + 月度数字滚动触发
 * ====================================================== */
function setupChapterObservers() {
  // 章节标题
  var heads = document.querySelectorAll('.chapter-head');
  if (!('IntersectionObserver' in window)) {
    heads.forEach(function(h) { h.classList.add('visible'); });
  } else {
    var headObserver = new IntersectionObserver(function(entries) {
      entries.forEach(function(entry) {
        if (entry.isIntersecting) {
          entry.target.classList.add('visible');
          headObserver.unobserve(entry.target);
        }
      });
    }, { threshold: 0.3 });
    heads.forEach(function(h) { headObserver.observe(h); });
  }

  // 月度卡片进入视口时触发数字滚动
  var monthlyCard = document.getElementById('monthlyCard');
  if (!('IntersectionObserver' in window)) {
    animateMonthlyNumbers();
  } else {
    var monthlyObserver = new IntersectionObserver(function(entries) {
      entries.forEach(function(entry) {
        if (entry.isIntersecting) {
          animateMonthlyNumbers();
          monthlyObserver.unobserve(entry.target);
        }
      });
    }, { threshold: 0.4 });
    if (monthlyCard) monthlyObserver.observe(monthlyCard);
  }
}

/* ========================================================
 * 进度指示器：滚动同步 + 点击跳转
 * ====================================================== */
function setupProgressDots() {
  var dots = document.querySelectorAll('.progress-dots .pdot');
  var chapters = ['ch1', 'ch2', 'ch3'].map(function(id) { return document.getElementById(id); });

  // 点击跳转
  dots.forEach(function(dot) {
    dot.addEventListener('click', function() {
      var target = document.getElementById(dot.getAttribute('data-target'));
      if (target) target.scrollIntoView({ behavior: 'smooth', block: 'start' });
    });
  });

  // 滚动同步当前章节
  function updateActive() {
    var scrollY = window.scrollY || window.pageYOffset;
    var viewH = window.innerHeight;
    var activeIdx = 0;
    // 用「章节中心距离视口中心最近」作为判断依据
    var midline = scrollY + viewH / 2;
    var bestDist = Infinity;
    chapters.forEach(function(ch, idx) {
      if (!ch) return;
      var top = ch.offsetTop;
      var center = top + ch.offsetHeight / 2;
      var dist = Math.abs(center - midline);
      if (dist < bestDist) {
        bestDist = dist;
        activeIdx = idx;
      }
    });
    dots.forEach(function(d, i) {
      if (i === activeIdx) d.classList.add('active');
      else d.classList.remove('active');
    });
  }

  // 节流：rAF
  var ticking = false;
  window.addEventListener('scroll', function() {
    if (!ticking) {
      window.requestAnimationFrame(function() {
        updateActive();
        ticking = false;
      });
      ticking = true;
    }
  }, { passive: true });
  window.addEventListener('resize', updateActive, { passive: true });
  updateActive();
}

/* ========================================================
 * 初始化
 * ====================================================== */
function init() {
  // 1. 渲染所有数据模块
  renderAll();

  // 2. 渲染轻声说模块（场景 chips + 占位符）
  renderWhisperScenes('express');
  renderWhisperScenes('heal');

  // 3. 初始观察所有 .reveal 元素（card / glimmer-card）
  observeReveal(document.querySelectorAll('.reveal'));

  // 4. 章节标题 + 月度数字动画
  setupChapterObservers();

  // 5. 进度指示器
  setupProgressDots();
}

// DOM 就绪后初始化
if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', init);
} else {
  init();
}
</script>
