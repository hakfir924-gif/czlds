<script>
/* ========================================================
 * 慢慢说 Demo —— 纯前端展示页
 * 所有数据写死在 JS 中，不依赖任何后端 / API
 * ====================================================== */

/* ---------- XSS 防护：HTML 转义 ---------- */
function escapeHtml(str) {
  if (str === null || str === undefined) return '';
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

/* ---------- 写死的 Mock 数据 ---------- */
var DATA = {
  // 每日小签
  sign: {
    type: '一句话',
    content: '今天不用很完美，今天你已经在对方心里了。'
  },
  // 两个人的微光（me / ta 各自一份）
  members: {
    me: { emoji: '😊', status: '开心', text: '今天项目终于上线了，第一个想分享的人就是你。', time: '18:30' },
    ta: { emoji: '😌', status: '平静', text: '下午去散步，看到一只橘猫晒太阳，想起了你。', time: '16:45' }
  },
  // 每日一问
  dailyQuestion: {
    question: '你们之间最让你怀念的一个瞬间是什么？',
    me: '上次下雨你没带伞，我跑去接你，两个人淋着雨笑了一路。',
    ta: '你第一次做饭给我吃，虽然有点咸，但你紧张的样子特别可爱。'
  },
  // 默契挑战
  telepathy: {
    question: 'Ta 最喜欢的食物是什么？',
    meGuess: '火锅',    // 我猜 Ta 喜欢
    taGuess: '寿司',    // Ta 猜我喜欢
    meActual: '寿司',   // 我的实际答案
    taActual: '火锅'    // Ta 的实际答案
  },
  // 真心话
  truth: {
    question: '最近一次被 Ta 感动是什么时候？',
    me: '上周我加班到很晚，回家发现你给我留了灯和热好的饭。',
    ta: '你记得我随口说过想吃的每一样东西。'
  },
  // 此刻予你
  photo: {
    theme: '拍一张你此刻看到的光',
    // 历史记录：3 天前两人各拍了一张
    history: [
      { time: '3 天前', me: '窗外的晚霞', ta: '我养的多肉开花了' }
    ]
  },
  // 月度回顾
  monthly: {
    stats: [
      { label: '微光时刻', value: 8 },
      { label: '轻声说', value: 3 },
      { label: '此刻予你', value: 2 },
      { label: '每日一问', value: 7 }
    ],
    summary: '这个月你们一起留下了 20 个温暖瞬间。最常出现的心情是‘平静’。下次见面，可以聊聊那些一起看过的晚霞。'
  }
};

/* ---------- 当前视角：'me' 或 'ta' ---------- */
var currentRole = 'me';

/* ---------- 工具：根据当前视角得到 self / other 的 key ---------- */
function selfKey() { return currentRole; }
function otherKey() { return currentRole === 'me' ? 'ta' : 'me'; }

/* ---------- 渲染：每日小签 ---------- */
function renderSign() {
  document.getElementById('signTag').textContent = escapeHtml(DATA.sign.type);
  document.getElementById('signText').textContent = escapeHtml(DATA.sign.content);
}

/* ---------- 渲染：现在的我 + 现在的Ta ---------- */
function renderGlimmer() {
  var sKey = selfKey();
  var oKey = otherKey();
  var self = DATA.members[sKey];
  var other = DATA.members[oKey];

  // 「现在的我」放当前视角的人，「现在的Ta」放对方；切换视角时内容互换
  var html = '' +
    '<div class="glimmer-card self">' +
      '<div class="g-avatar ' + (sKey === 'me' ? 'me' : 'ta') + '">' + (sKey === 'me' ? '我' : 'Ta') + '</div>' +
      '<div class="g-name">现在的我</div>' +
      '<div class="g-status">' + escapeHtml(self.emoji) + ' ' + escapeHtml(self.status) + '</div>' +
      '<div class="g-text">' + escapeHtml(self.text) + '</div>' +
      '<div class="g-time">' + escapeHtml(self.time) + '</div>' +
    '</div>' +
    '<div class="glimmer-card other">' +
      '<div class="g-avatar ' + (oKey === 'me' ? 'me' : 'ta') + '">' + (oKey === 'me' ? '我' : 'Ta') + '</div>' +
      '<div class="g-name">现在的 Ta</div>' +
      '<div class="g-status">' + escapeHtml(other.emoji) + ' ' + escapeHtml(other.status) + '</div>' +
      '<div class="g-text">' + escapeHtml(other.text) + '</div>' +
      '<div class="g-time">' + escapeHtml(other.time) + '</div>' +
    '</div>';
  document.getElementById('glimmerGrid').innerHTML = html;
}

/* ---------- 渲染：每日一问 ---------- */
function renderDailyQ() {
  var dq = DATA.dailyQuestion;
  document.getElementById('dailyQQ').textContent = escapeHtml(dq.question);

  var sKey = selfKey();
  var oKey = otherKey();
  // 当前视角的回答高亮，对方的半透明（表示「Ta 已经回答了」）
  var html =
    answerBlock('self', sKey, dq[sKey], 'answer') +
    answerBlock('other', oKey, dq[oKey], 'answer');
  document.getElementById('dailyQAnswers').innerHTML = html;
}

/* ---------- 渲染：默契挑战 ---------- */
function renderTelepathy() {
  var tp = DATA.telepathy;
  document.getElementById('telepathyQ').textContent = escapeHtml(tp.question);

  var sKey = selfKey();
  var oKey = otherKey();
  // 「我猜 Ta 喜欢」= 当前视角的人的猜测
  var selfGuess = sKey === 'me' ? tp.meGuess : tp.taGuess;
  var otherGuess = oKey === 'me' ? tp.meGuess : tp.taGuess;
  // 实际答案：当前视角的人的实际答案 / 对方的实际答案
  var selfActual = sKey === 'me' ? tp.meActual : tp.taActual;
  var otherActual = oKey === 'me' ? tp.meActual : tp.taActual;

  var rowHtml =
    '<div class="tele-cell">' +
      '<div class="tele-label">我猜 Ta 喜欢</div>' +
      '<div class="tele-value">' + escapeHtml(selfGuess) + '</div>' +
    '</div>' +
    '<div class="tele-cell">' +
      '<div class="tele-label">Ta 猜我喜欢</div>' +
      '<div class="tele-value">' + escapeHtml(otherGuess) + '</div>' +
    '</div>';
  document.getElementById('telepathyRow').innerHTML = rowHtml;

  var actualHtml =
    '<span class="ta-label">实际答案</span>' +
    '<span class="ta-values">我喜欢 <b>' + escapeHtml(selfActual) + '</b> · Ta 喜欢 <b>' + escapeHtml(otherActual) + '</b></span>';
  document.getElementById('telepathyActual').innerHTML = actualHtml;

  // 两人都猜错 → 制造趣味
  var selfCorrect = (selfGuess === otherActual);   // 我猜的 == Ta 实际喜欢的
  var otherCorrect = (otherGuess === selfActual);  // Ta 猜的 == 我实际喜欢的
  var resultText;
  if (!selfCorrect && !otherCorrect) {
    resultText = '你们都猜错啦 —— 但这样才有更多了解彼此的空间 ✨';
  } else if (selfCorrect && otherCorrect) {
    resultText = '默契满分！你们真的很懂对方 🎉';
  } else if (selfCorrect) {
    resultText = '你猜对了 Ta，但 Ta 还没那么懂你 🙂';
  } else {
    resultText = 'Ta 比你更懂你 🙂';
  }
  document.getElementById('telepathyResult').textContent = resultText;
}

/* ---------- 渲染：真心话 ---------- */
function renderTruth() {
  var tr = DATA.truth;
  document.getElementById('truthQ').textContent = escapeHtml(tr.question);

  var sKey = selfKey();
  var oKey = otherKey();
  var html =
    answerBlock('self', sKey, tr[sKey], 'share') +
    answerBlock('other', oKey, tr[oKey], 'share');
  document.getElementById('truthAnswers').innerHTML = html;
}

/* ---------- 通用：回答 / 分享区块 ---------- */
// kind: 'self' 高亮 | 'other' 半透明；labelType: 'answer' 回答 | 'share' 分享
function answerBlock(kind, roleKey, text, labelType) {
  var noun = labelType === 'share' ? '分享' : '回答';
  var label = roleKey === 'me' ? ('我的' + noun) : ('Ta 的' + noun);
  return '' +
    '<div class="ans-block ' + kind + '">' +
      '<div class="ans-label ' + kind + '">' +
        '<span class="av-mini ' + (roleKey === 'me' ? 'me' : 'ta') + '">' + (roleKey === 'me' ? '我' : 'Ta') + '</span>' +
        '<span>' + escapeHtml(label) + '</span>' +
      '</div>' +
      '<div class="ans-text">' + escapeHtml(text) + '</div>' +
    '</div>';
}

/* ---------- 渲染：此刻予你 ---------- */
function renderPhoto() {
  document.getElementById('photoTheme').textContent = escapeHtml(DATA.photo.theme);

  var sKey = selfKey();
  var oKey = otherKey();
  var h = DATA.photo.history[0];
  // 历史记录中两人各拍一张，按当前视角标注哪张是「我」、哪张是「Ta」
  // 约定：原始数据里 me 字段是「我」拍的，ta 字段是「Ta」拍的；切换视角时标签互换
  var selfPhoto = sKey === 'me' ? h.me : h.ta;
  var otherPhoto = oKey === 'me' ? h.me : h.ta;

  var html =
    '<div class="ph-title">历史记录</div>' +
    '<div class="photo-history-item">' +
      '<span class="ph-time">' + escapeHtml(h.time) + '</span>' +
      '<div class="ph-photos">' +
        '<span class="ph-photo self">' +
          '<span class="ph-av ' + (sKey === 'me' ? 'me' : 'ta') + '">' + (sKey === 'me' ? '我' : 'Ta') + '</span>' +
          escapeHtml(selfPhoto) +
        '</span>' +
        '<span class="ph-photo other">' +
          '<span class="ph-av ' + (oKey === 'me' ? 'me' : 'ta') + '">' + (oKey === 'me' ? '我' : 'Ta') + '</span>' +
          escapeHtml(otherPhoto) +
        '</span>' +
      '</div>' +
    '</div>';
  document.getElementById('photoHistory').innerHTML = html;
}

/* ---------- 渲染：月度回顾 ---------- */
function renderMonthly() {
  var statsHtml = DATA.monthly.stats.map(function(s) {
    return '' +
      '<div class="stat-block">' +
        '<div class="stat-value">' + escapeHtml(String(s.value)) + '</div>' +
        '<div class="stat-label">' + escapeHtml(s.label) + '</div>' +
      '</div>';
  }).join('');
  document.getElementById('monthlyStats').innerHTML = statsHtml;
  document.getElementById('monthlySummary').textContent = DATA.monthly.summary;
}

/* ---------- 统一渲染所有模块 ---------- */
function renderAll() {
  renderSign();
  renderGlimmer();
  renderDailyQ();
  renderTelepathy();
  renderTruth();
  renderPhoto();
  renderMonthly();

  // 更新视角切换按钮文案
  var btn = document.getElementById('roleSwitch');
  btn.textContent = currentRole === 'me' ? '切换为 Ta' : '切换为我';
}

/* ---------- 切换视角 ---------- */
function switchRole() {
  currentRole = (currentRole === 'me') ? 'ta' : 'me';
  renderAll();
}

/* ---------- 初始化 ---------- */
renderAll();
</script>

</body>
