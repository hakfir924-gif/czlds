<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>慢慢说 — 登录</title>
<style>
@font-face {
  font-family: 'WorkSans';
  src: url('./_shared/fonts/WorkSans-Regular.ttf') format('truetype');
  font-weight: 400; font-style: normal;
}
@font-face {
  font-family: 'WorkSans';
  src: url('./_shared/fonts/WorkSans-Bold.ttf') format('truetype');
  font-weight: 700; font-style: normal;
}

:root {
  --bg: #14110d;
  --bg2: #1c1813;
  --card: #1f1a14;
  --ink: #ede4d3;
  --ink2: #b8ac97;
  --muted: #7a7163;
  --rule: #2e281f;
  --accent: #d4a373;
  --accent-soft: #b8895c;
  --accent-light: #2a2218;
  --accent2: #6f8268;
  --shadow-lg: 0 12px 40px rgba(0, 0, 0, 0.5);
  --radius-sm: 10px;
  --radius-lg: 16px;
  --font-heading: 'WorkSans', 'PingFang SC', 'Noto Sans CJK SC', 'Microsoft YaHei', sans-serif;
  --font-body: 'PingFang SC', 'Noto Sans CJK SC', 'Microsoft YaHei', sans-serif;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body {
  font-family: var(--font-body);
  background: var(--bg);
  color: var(--ink);
  -webkit-font-smoothing: antialiased;
  overflow: hidden;
}

.page {
  height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 32px 24px;
}

.brand { text-align: center; margin-bottom: 32px; animation: fadeIn 0.8s ease 0.2s both; }
.brand-title {
  font-family: var(--font-heading);
  font-size: 2.4rem; font-weight: 700;
  letter-spacing: 0.04em; color: var(--ink); line-height: 1;
}
.brand-title .dot { color: var(--accent); }
.brand-subtitle { margin-top: 8px; font-size: 0.8rem; color: var(--muted); letter-spacing: 0.08em; }

.auth-card {
  width: 100%; max-width: 380px;
  background: var(--card);
  border: 1px solid var(--rule);
  border-radius: var(--radius-lg);
  padding: 28px 24px;
  box-shadow: var(--shadow-lg);
  animation: fadeIn 0.8s ease 0.4s both;
}

.tabs {
  display: flex; background: var(--bg2);
  border-radius: 100px; padding: 4px; margin-bottom: 24px;
}
.tab {
  flex: 1; padding: 10px 0; text-align: center;
  font-size: 0.88rem; font-weight: 600; color: var(--muted);
  cursor: pointer; border-radius: 100px;
  transition: all 0.3s ease; border: none; background: transparent;
  font-family: var(--font-body);
}
.tab.active { background: var(--accent); color: #fff; }

.field { margin-bottom: 16px; }
.field.hidden { display: none; }
.field-label {
  display: block; font-size: 0.78rem; color: var(--ink2);
  margin-bottom: 6px; font-weight: 500;
}
.field-input {
  width: 100%; padding: 13px 14px;
  font-size: 0.92rem; font-family: var(--font-body);
  color: var(--ink); background: var(--bg2);
  border: 1px solid var(--rule); border-radius: var(--radius-sm);
  transition: all 0.3s ease;
}
.field-input:focus {
  outline: none; border-color: var(--accent); background: var(--bg);
  box-shadow: 0 0 0 3px rgba(212, 163, 115, 0.12);
}
.field-input::placeholder { color: var(--muted); opacity: 0.6; }

.hint {
  font-size: 0.78rem; color: var(--muted);
  min-height: 18px; margin-bottom: 12px; transition: color 0.3s ease;
}
.hint.error { color: #c97d6d; }

.submit-btn {
  width: 100%; padding: 14px;
  font-size: 0.95rem; font-weight: 600;
  border: none; border-radius: 100px; cursor: pointer;
  background: var(--accent); color: #fff;
  transition: all 0.3s ease; font-family: var(--font-body);
  letter-spacing: 0.04em;
}
.submit-btn:hover { background: var(--accent-soft); }
.submit-btn:disabled { opacity: 0.6; cursor: not-allowed; }

.footer-link {
  margin-top: 24px; text-align: center;
  font-size: 0.82rem; color: var(--muted);
  animation: fadeIn 0.8s ease 0.6s both;
}
.footer-link a { color: var(--accent); text-decoration: none; cursor: pointer; }
.footer-link a:hover { color: var(--accent-soft); }

@keyframes fadeIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
@keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-6px); } 75% { transform: translateX(6px); } }
.shake { animation: shake 0.4s ease; }
</style>
</head>
<body>

<div class="page">
  <div class="brand">
    <h1 class="brand-title">慢慢说<span class="dot">.</span></h1>
    <div class="brand-subtitle">SLOWLY · TOGETHER</div>
  </div>

  <div class="auth-card">
    <div class="tabs">
      <button class="tab active" id="tabLogin" onclick="switchTab('login')">登录</button>
      <button class="tab" id="tabRegister" onclick="switchTab('register')">注册</button>
    </div>

    <div class="field hidden" id="fieldNickname">
      <label class="field-label">昵称（可选）</label>
      <input type="text" class="field-input" id="nicknameInput" placeholder="想被怎么称呼" maxlength="12" autocomplete="off">
    </div>

    <div class="field">
      <label class="field-label">用户名</label>
      <input type="text" class="field-input" id="usernameInput" placeholder="3-20 位字母或数字" maxlength="20" autocomplete="off">
    </div>

    <div class="field">
      <label class="field-label">密码</label>
      <input type="password" class="field-input" id="passwordInput" placeholder="至少 6 位" maxlength="40" autocomplete="off">
    </div>

    <p class="hint" id="hint">还没账号？切到注册</p>
    <button class="submit-btn" id="submitBtn" onclick="submit()">登录</button>
  </div>

  <div class="footer-link">只想用钥匙？<a onclick="goIndex()">直接进空间 →</a></div>
</div>

<script>
var API_BASE = (location.hostname === 'localhost' || location.hostname === '127.0.0.1')
  ? 'http://localhost:3000'
  : 'http://' + location.hostname + ':3000';

var mode = 'login';

function switchTab(m) {
  mode = m;
  document.getElementById('tabLogin').classList.toggle('active', m === 'login');
  document.getElementById('tabRegister').classList.toggle('active', m === 'register');
  document.getElementById('fieldNickname').classList.toggle('hidden', m === 'login');
  document.getElementById('submitBtn').textContent = m === 'login' ? '登录' : '注册';
  var hint = document.getElementById('hint');
  hint.textContent = m === 'login' ? '还没账号？切到注册' : '注册后可保存你的房间记录';
  hint.classList.remove('error');
}

function setHint(text, isError) {
  var hint = document.getElementById('hint');
  hint.textContent = text;
  hint.classList.toggle('error', !!isError);
  if (isError) {
    var card = document.querySelector('.auth-card');
    card.classList.add('shake');
    setTimeout(function() { card.classList.remove('shake'); }, 400);
  }
}

function submit() {
  var username = document.getElementById('usernameInput').value.trim();
  var password = document.getElementById('passwordInput').value;
  var nickname = document.getElementById('nicknameInput').value.trim();
  var btn = document.getElementById('submitBtn');

  if (!username || !password) { setHint('用户名和密码都要填', true); return; }

  btn.disabled = true;
  btn.textContent = mode === 'login' ? '登录中…' : '注册中…';

  var url = mode === 'login' ? '/api/auth/login' : '/api/auth/register';
  var body = { username: username, password: password };
  if (mode === 'register' && nickname) body.nickname = nickname;

  fetch(API_BASE + url, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body)
  })
  .then(function(r) { return r.json(); })
  .then(function(data) {
    btn.disabled = false;
    btn.textContent = mode === 'login' ? '登录' : '注册';
    if (!data.success) { setHint(data.error || '操作失败', true); return; }
    localStorage.setItem('mm_token', data.token);
    localStorage.setItem('mm_user', JSON.stringify(data.user));
    btn.textContent = '✓ 成功';
    btn.style.background = 'var(--accent2)';
    setTimeout(function() { window.location.href = './profile.html'; }, 600);
  })
  .catch(function() {
    btn.disabled = false;
    btn.textContent = mode === 'login' ? '登录' : '注册';
    setHint('网络错误，请重试', true);
  });
}

function goIndex() { window.location.href = './index.html'; }

document.getElementById('passwordInput').addEventListener('keypress', function(e) {
  if (e.key === 'Enter') submit();
});

// 已登录则直接跳个人中心
if (localStorage.getItem('mm_token')) {
  fetch(API_BASE + '/api/auth/me?token=' + localStorage.getItem('mm_token'))
    .then(function(r) { return r.json(); })
    .then(function(data) { if (data.success) window.location.href = './profile.html'; })
    .catch(function() {});
}
</script>
</body>
</html>
