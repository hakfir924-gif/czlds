function escapeHtml(s) {
  var d = document.createElement('div'); d.textContent = s; return d.innerHTML;
}

// 时间格式化
function formatTime(ts) {
  if (!ts) return '';
  var d = new Date(ts);
  var h = d.getHours().toString().padStart(2, '0');
  var m = d.getMinutes().toString().padStart(2, '0');
  return h + ':' + m;
}
function formatDateTime(dateStr) {
  if (!dateStr) return '';
  return dateStr;
}

// ========== 默契挑战 ==========
// Track current render state to avoid unnecessary re-rendering
var _challengeRenderState = '';

function renderChallenge() {
  var el = document.getElementById('challengeState');
  var btn = document.getElementById('challengeRefreshBtn');

  var myGuess = role === 'me' ? chGuessMe : chGuessTa;
  var myAnswer = role === 'me' ? chAnswerMe : chAnswerTa;
  var taGuess = role === 'me' ? chGuessTa : chGuessMe;
  var taAnswer = role === 'me' ? chAnswerTa : chAnswerMe;

  var bothGuessed = chGuessMe && chGuessTa;
  var bothAnswered = chAnswerMe && chAnswerTa;
  var allDone = bothGuessed && bothAnswered;

  // Determine which state we should be in
  var targetState = '';
  if (allDone) targetState = 'reveal';
  else if (myGuess && myAnswer) targetState = 'wait';
  else if (myGuess) targetState = 'answer';
  else targetState = 'guess';

  // If state hasn't changed, only update dynamic content (hint text) without replacing DOM
  if (targetState === _challengeRenderState) {
    if (targetState === 'answer' || targetState === 'guess') {
      // Update hint text only
      var hintEl = el.querySelector('.ch-hint');
      if (hintEl) {
        var newHint = '';
        if (taGuess && taAnswer) newHint = '💜 Ta已经猜完并回答了，等你来';
        else if (taGuess) newHint = '💜 Ta已经猜了你的答案，该你了';
        else if (taAnswer) newHint = '💜 Ta已经回答了，等你来猜';
        if (hintEl.textContent !== newHint) hintEl.textContent = newHint;
      }
    }
    // For reveal/wait states, nothing dynamic to update
    return;
  }

  // State changed - do full render
  _challengeRenderState = targetState;

  // Build hint for what the other person has done
  var otherHint = '';
  if (taGuess && taAnswer) {
    otherHint = '<div class="ch-hint" style="text-align:center;padding:6px 0;color:#c97d9d;font-size:0.78rem;font-weight:600;">💜 Ta已经猜完并回答了，等你来</div>';
  } else if (taGuess) {
    otherHint = '<div class="ch-hint" style="text-align:center;padding:6px 0;color:#c97d9d;font-size:0.78rem;font-weight:600;">💜 Ta已经猜了你的答案，该你了</div>';
  } else if (taAnswer) {
    otherHint = '<div class="ch-hint" style="text-align:center;padding:6px 0;color:#c97d9d;font-size:0.78rem;font-weight:600;">💜 Ta已经回答了，等你来猜</div>';
  }

  if (allDone) {
    btn.disabled = false; btn.style.opacity = '1';
    var myMatch = myGuess.trim() === taAnswer.trim();
    var matchClass = myMatch ? 'match' : 'miss';
    var matchText = myMatch ? '🎯 猜对了！' : '💫 差一点，原来Ta是这样想的';
    el.innerHTML = '<div class="challenge-reveal">' +
      '<div class="cr-row"><span class="cr-label">我猜Ta</span><span class="cr-text">' + escapeHtml(myGuess) + '</span></div>' +
      '<div class="cr-row"><span class="cr-label">Ta说</span><span class="cr-text">' + escapeHtml(taAnswer) + '</span></div>' +
      '<div class="cr-result ' + matchClass + '">' + matchText + '</div>' +
      '</div>';
  } else if (myGuess && myAnswer) {
    btn.disabled = true; btn.style.opacity = '0.4';
    el.innerHTML = '<div class="waiting">' +
      '<div class="wait-icon">✅</div>' +
      '<div class="wait-text">你的答案已保存<br>等Ta猜完揭晓...</div>' +
      '<div class="wait-dots"><span></span><span></span><span></span></div>' +
      '<div class="hint-tip">等Ta回答完再换题吧</div>' +
      '</div>';
  } else if (myGuess) {
    btn.disabled = true; btn.style.opacity = '0.4';
    el.innerHTML = otherHint +
      '<div class="input-row">' +
      '<input id="chAnswerInput" placeholder="你的真实答案是什么？" maxlength="80" autocomplete="off">' +
      '<button class="send-btn" id="chAnswerBtn">➤</button>' +
      '</div>';
    var inp = document.getElementById('chAnswerInput');
    if (inp) {
      inp.addEventListener('keydown', function(e) { if (e.key === 'Enter') submitChallengeAnswer(); });
      setTimeout(function() { inp.focus(); }, 100);
    }
    var btnEl = document.getElementById('chAnswerBtn');
    if (btnEl) btnEl.addEventListener('click', submitChallengeAnswer);
  } else {
    btn.disabled = false; btn.style.opacity = '1';
    el.innerHTML = otherHint +
      '<div class="input-row">' +
      '<input id="chGuessInput" placeholder="猜猜Ta会怎么回答？" maxlength="80" autocomplete="off">' +
      '<button class="send-btn" id="chGuessBtn">➤</button>' +
      '</div>';
    var inp2 = document.getElementById('chGuessInput');
    if (inp2) {
      inp2.addEventListener('keydown', function(e) { if (e.key === 'Enter') submitChallengeGuess(); });
      setTimeout(function() { inp2.focus(); }, 100);
    }
    var btnEl2 = document.getElementById('chGuessBtn');
    if (btnEl2) btnEl2.addEventListener('click', submitChallengeGuess);
  }
}

  var guess = inp.value.trim();
  if (!guess) return;
  if (role === 'me') chGuessMe = guess; else chGuessTa = guess;
  renderChallenge();

function renderAllHistory() {
  var sec = document.getElementById('historySection');
  var list = document.getElementById('historyList');
  if (allHistory.length === 0) { sec.style.display = 'none'; return; }
  sec.style.display = 'block';

  var html = '';
  allHistory.slice().reverse().forEach(function(h) {
    if (h.type === 'daily') {
      html += '<div class="history-item">';
      html += '<div class="hi-date">' + escapeHtml(h.date) + '</div>';
      html += '<span class="hi-badge daily">每日一问</span>';
      html += '<div class="hi-q">' + escapeHtml(h.question) + '</div>';
      html += '<div class="hi-a"><span>🔸 我：' + escapeHtml(h.me) + '</span><span>🔹 Ta：' + escapeHtml(h.ta) + '</span></div>';
      html += '</div>';
    } else if (h.type === 'challenge') {
      html += '<div class="history-item">';
      html += '<div class="hi-date">' + escapeHtml(h.date) + '</div>';
      html += '<span class="hi-badge challenge">默契挑战</span>';
      html += '<div class="hi-q">' + escapeHtml(h.question) + '</div>';
      html += '<div class="hi-a">🔸 我猜Ta：' + escapeHtml(h.meGuess) + ' | Ta说：' + escapeHtml(h.taAnswer) + '</div>';
      html += '<div class="hi-a" style="margin-top:2px;">🔹 Ta猜我：' + escapeHtml(h.taGuess) + ' | 我说：' + escapeHtml(h.meAnswer) + '</div>';
      html += '</div>';
    } else if (h.type === 'truth') {
      html += '<div class="history-item">';
      html += '<div class="hi-date">' + escapeHtml(h.date) + '</div>';
      html += '<span class="hi-badge truth">真心话</span>';
      html += '<div class="hi-q">' + escapeHtml(h.question) + '</div>';
      if (h.me) html += '<div class="hi-a">🔸 我：' + escapeHtml(h.me) + '</div>';
      if (h.ta) html += '<div class="hi-a">🔹 Ta：' + escapeHtml(h.ta) + '</div>';
      html += '</div>';
    }
  });
  list.innerHTML = html;
}

function toggleHistory() {
  var list = document.getElementById('historyList');
  var arrow = document.getElementById('historyArrow');
  var isOpen = list.classList.contains('open');
  if (isOpen) { list.classList.remove('open'); arrow.classList.remove('open'); }
  else { list.classList.add('open'); arrow.classList.add('open'); }
}

// ========== 此刻予你 ==========
var _momentRenderState = '';
var _momentTaJustArrived = false;

function renderPhotoExchange() {
  var el = document.getElementById('photoState');
  var myPhoto = role === 'me' ? photoMe : photoTa;
  var taPhoto = role === 'me' ? photoTa : photoMe;

  var bothUploaded = myPhoto.uploaded && taPhoto.uploaded;

  // Determine target state
  var targetState = '';
  if (bothUploaded && !_momentTaJustArrived) targetState = 'reveal';
  else if (myPhoto.uploaded) targetState = 'wait';
  else targetState = 'upload';

  // If state hasn't changed, skip full re-render to preserve user input
  if (targetState === _momentRenderState) {
    return;
  }

  // State changed - do full render
  _momentRenderState = targetState;

  if (bothUploaded) {
    // Reveal state - show both photos side by side
    var historyHtml = renderPhotoHistoryHtml();
    el.innerHTML = '<div class="moment-reveal">' +
      '<div class="moment-reveal-title">✨ 此刻交换完成 ✨</div>' +
      '<div class="moment-reveal-grid">' +
      '<div class="moment-reveal-item">' +
      '<div class="mr-label">💌 Ta的此刻</div>' +
      '<img class="mr-img" src="' + escapeHtml(taPhoto.photoUrl) + '" alt="Ta的此刻">' +
      (taPhoto.note ? '<div class="mr-note">' + escapeHtml(taPhoto.note) + '</div>' : '') +
      (taPhoto.timestamp ? '<div class="moment-time">' + formatTime(taPhoto.timestamp) + '</div>' : '') +
      '</div>' +
      '<div class="moment-reveal-item">' +
      '<div class="mr-label">💌 我的此刻</div>' +
      '<img class="mr-img" src="' + escapeHtml(myPhoto.photoUrl) + '" alt="我的此刻">' +
      (myPhoto.note ? '<div class="mr-note">' + escapeHtml(myPhoto.note) + '</div>' : '') +
      (myPhoto.timestamp ? '<div class="moment-time">' + formatTime(myPhoto.timestamp) + '</div>' : '') +
      '</div>' +
      '</div>' +
      historyHtml +
      '<button class="moment-reset-btn" onclick="resetPhotoExchange()">再分享此刻</button>' +
      '</div>';
    // 绑定历史展开事件
    var histBtn = el.querySelector('.moment-history-toggle');
    if (histBtn) histBtn.addEventListener('click', toggleMomentHistory);
  } else if (myPhoto.uploaded) {
    // Waiting state - I uploaded, waiting for Ta
    var taNotifyHtml = '';
    if (taPhoto.uploaded) {
      taNotifyHtml = '<div class="moment-ta-notify" onclick="_momentTaJustArrived=false; _momentRenderState=\'\'; renderPhotoExchange();">' +
        '<div class="notify-icon">✨</div>' +
        '<div class="notify-text">Ta的此刻已送达！</div>' +
        '<div class="notify-hint">点击揭晓 ↓</div>' +
        '</div>';
    }
    el.innerHTML = '<div class="moment-waiting">' +
      '<img class="wait-photo" src="' + escapeHtml(myPhoto.photoUrl) + '" alt="我的此刻">' +
      '<div class="wait-text">💌 你的此刻已送达</div>' +
      (myPhoto.timestamp ? '<div class="moment-time">' + formatTime(myPhoto.timestamp) + '</div>' : '') +
      (myPhoto.note ? '<div class="wait-note">"' + escapeHtml(myPhoto.note) + '"</div>' : '') +
      '<div class="wait-sub">等待Ta的此刻...</div>' +
      taNotifyHtml +
      '</div>';
  } else {
    // Upload state - show upload area
    el.innerHTML = '<div class="moment-section">' +
      '<div class="moment-upload-wrap">' +
      '<div class="moment-upload-area" onclick="document.getElementById(\'momentFile\').click()">' +
      '<div class="upload-icon">📷</div>' +
      '<div class="upload-text">选一张照片<br>给Ta</div>' +
      '</div>' +
      '<input type="file" id="momentFile" accept="image/*" onchange="onPhotoSelected(event)">' +
      '<div id="momentPreviewContainer"></div>' +
      '<input type="text" id="momentNote" class="moment-note-input" placeholder="此刻想对Ta说..." maxlength="100">' +
      '<button class="moment-send-btn" id="momentSendBtn" onclick="submitPhoto()" disabled>💌 发给Ta</button>' +
      '</div>' +
      '</div>';
  }
}

// 生成历史记录HTML
function renderPhotoHistoryHtml() {
  if (!photoHistory || photoHistory.length === 0) return '';
  var items = photoHistory.slice().reverse();
  var listHtml = '';
  items.forEach(function(h) {
    listHtml += '<div class="moment-history-item">' +
      '<div class="mhi-date">' + escapeHtml(h.date || '') + '</div>' +
      '<div class="mhi-photos">' +
      '<div class="mhi-photo">' +
      '<img src="' + escapeHtml(h.ta.photoUrl) + '" alt="Ta">' +
      '<div class="mhi-label">💌 Ta</div>' +
      (h.ta.note ? '<div class="mhi-note">' + escapeHtml(h.ta.note) + '</div>' : '') +
      '</div>' +
      '<div class="mhi-photo">' +
      '<img src="' + escapeHtml(h.me.photoUrl) + '" alt="我">' +
      '<div class="mhi-label">💌 我</div>' +
      (h.me.note ? '<div class="mhi-note">' + escapeHtml(h.me.note) + '</div>' : '') +
      '</div>' +
      '</div>' +
      '</div>';
  });
  return '<button class="moment-history-toggle">📖 查看过往此刻 <span class="mh-arrow' + (momentHistoryOpen ? ' open' : '') + '">∧</span></button>' +
    '<div class="moment-history-list' + (momentHistoryOpen ? ' open' : '') + '">' + listHtml + '</div>';
}

function toggleMomentHistory() {
  momentHistoryOpen = !momentHistoryOpen;
  var list = document.querySelector('.moment-history-list');
  var arrow = document.querySelector('.mh-arrow');
  if (list) { if (momentHistoryOpen) list.classList.add('open'); else list.classList.remove('open'); }
  if (arrow) { if (momentHistoryOpen) arrow.classList.add('open'); else arrow.classList.remove('open'); }
}

function onPhotoSelected(e) {
  var file = e.target.files[0];
  if (!file) return;
  var reader = new FileReader();
  reader.onload = function(ev) {
    photoPreviewUrl = ev.target.result;
    var container = document.getElementById('momentPreviewContainer');
    if (container) {
      container.innerHTML = '<img class="moment-preview" src="' + photoPreviewUrl + '" alt="预览">';
    }
    var btn = document.getElementById('momentSendBtn');
    if (btn) btn.disabled = false;
  };
  reader.readAsDataURL(file);
}

function submitPhoto() {
  var fileInput = document.getElementById('momentFile');
  var noteInput = document.getElementById('momentNote');
  if (!fileInput || !fileInput.files[0]) return;

  var file = fileInput.files[0];
  var note = noteInput ? noteInput.value.trim() : '';

  var formData = new FormData();
  formData.append('photo', file);
  formData.append('role', role);
  formData.append('note', note);

  var btn = document.getElementById('momentSendBtn');
  if (btn) { btn.disabled = true; btn.textContent = '发送中...'; }

  fetch(API_BASE + '/api/room/' + roomId + '/photo/upload', {
    method: 'POST', body: formData
  }).then(function(r) { return r.json(); })
    .then(function(data) {
      if (data.success) {
        var now = Date.now();
        if (role === 'me') { photoMe = { photoUrl: data.photoUrl, note: note, uploaded: true, timestamp: now }; }
        else { photoTa = { photoUrl: data.photoUrl, note: note, uploaded: true, timestamp: now }; }
        photoPreviewUrl = '';
        _momentRenderState = '';
        renderPhotoExchange();
      } else {
        if (btn) { btn.disabled = false; btn.textContent = '💌 发给Ta'; }
        alert('发送失败：' + (data.error || '未知错误'));
      }
    }).catch(function() {
      if (btn) { btn.disabled = false; btn.textContent = '💌 发给Ta'; }
      alert('发送失败，请检查网络');
    });
}

function resetPhotoExchange() {
  if (!confirm('确定要重新分享此刻吗？')) return;
  photoMe = { photoUrl: '', note: '', uploaded: false, timestamp: 0 };
  photoTa = { photoUrl: '', note: '', uploaded: false, timestamp: 0 };
  photoPreviewUrl = '';
  momentHistoryOpen = false;
  _momentTaJustArrived = false;
  _momentRenderState = '';
  renderPhotoExchange();
  if (roomId) {
    fetch(API_BASE + '/api/room/' + roomId + '/photo/reset', {
      method: 'POST', headers: { 'Content-Type': 'application/json' }
    }).catch(function() {});
  }
}

// ========== Polling ==========
function pollServer() {
  if (!roomId) return;
  fetch(API_BASE + '/api/room/' + roomId + '/poll?since=0&role=' + role)
    .then(function(r) { return r.json(); })
    .then(function(data) {
      if (!data || !data.success) return;
      var otherRole = role === 'ta' ? 'me' : 'ta';

      // Daily question
      if (data.dailyQuestion) {
        var changed = false;
        if (data.dailyQuestion !== dqQuestion) { dqQuestion = data.dailyQuestion; changed = true; }
        var myAns = data.dailyQuestionAnswers[role] || '';
        var taAns = data.dailyQuestionAnswers[otherRole] || '';
        if (myAns !== dqMe || taAns !== dqTa) { dqMe = myAns; dqTa = taAns; changed = true; }
        if (changed) { document.getElementById('dailyQuestion').textContent = dqQuestion; renderDaily(); }
      }

      // Challenge
      if (data.challengeQuestion) {
        var cChanged = false;
        var questionChanged = data.challengeQuestion !== chQuestion;
        if (questionChanged) { chQuestion = data.challengeQuestion; cChanged = true; }
        var srvMeGuess = data.challengeGuesses['me'] || '';
        var srvTaGuess = data.challengeGuesses['ta'] || '';
        var srvMeAnswer = data.challengeAnswers['me'] || '';
        var srvTaAnswer = data.challengeAnswers['ta'] || '';
        if (questionChanged) {
          chGuessMe = srvMeGuess; chGuessTa = srvTaGuess;
          chAnswerMe = srvMeAnswer; chAnswerTa = srvTaAnswer;
        } else {
          if (srvMeGuess !== chGuessMe && (srvMeGuess || !chGuessMe)) { chGuessMe = srvMeGuess; cChanged = true; }
          if (srvTaGuess !== chGuessTa && (srvTaGuess || !chGuessTa)) { chGuessTa = srvTaGuess; cChanged = true; }
          if (srvMeAnswer !== chAnswerMe && (srvMeAnswer || !chAnswerMe)) { chAnswerMe = srvMeAnswer; cChanged = true; }
          if (srvTaAnswer !== chAnswerTa && (srvTaAnswer || !chAnswerTa)) { chAnswerTa = srvTaAnswer; cChanged = true; }
        }
        if (cChanged) { document.getElementById('challengeQuestion').textContent = chQuestion; renderChallenge(); }
      }

      // Truth
      if (data.truthQuestion) {
        var tChanged = false;
        if (data.truthQuestion !== trQuestion) { trQuestion = data.truthQuestion; tChanged = true; }
        var srvMeShare = data.truthShares['me'] || '';
        var srvTaShare = data.truthShares['ta'] || '';
        if (srvMeShare !== trMe || srvTaShare !== trTa) { trMe = srvMeShare; trTa = srvTaShare; tChanged = true; }
        if (tChanged) { document.getElementById('truthQuestion').textContent = trQuestion; renderTruth(); }
      }

      // Photo exchange
      if (data.photoExchange) {
        var srvPhotoMe = data.photoExchange['me'] || { photoUrl: '', note: '', uploaded: false, timestamp: 0 };
        var srvPhotoTa = data.photoExchange['ta'] || { photoUrl: '', note: '', uploaded: false, timestamp: 0 };
        var photoChanged = false;
        if (srvPhotoMe.photoUrl !== photoMe.photoUrl || srvPhotoMe.uploaded !== photoMe.uploaded) {
          photoMe = srvPhotoMe; photoChanged = true;
        }
        // Ta上传了新照片 - 强制重渲染显示通知
        if (srvPhotoTa.photoUrl !== photoTa.photoUrl || srvPhotoTa.uploaded !== photoTa.uploaded) {
          var taJustUploaded = !photoTa.uploaded && srvPhotoTa.uploaded;
          photoTa = srvPhotoTa; photoChanged = true;
          if (taJustUploaded && photoMe.uploaded) {
            _momentTaJustArrived = true;
            _momentRenderState = '';
          }
        }
        // 更新photoHistory
        if (data.photoHistory) {
          photoHistory = data.photoHistory;
        }
        if (photoChanged) renderPhotoExchange();
      }

      // History
      var newHistory = [];
      (data.dailyQuestionHistory || []).forEach(function(h) { h.type = 'daily'; newHistory.push(h); });
      (data.challengeHistory || []).forEach(function(h) { h.type = 'challenge'; newHistory.push(h); });
      (data.truthHistory || []).forEach(function(h) { h.type = 'truth'; newHistory.push(h); });
      newHistory.sort(function(a, b) { return (a.timestamp || 0) - (b.timestamp || 0); });
      if (JSON.stringify(newHistory) !== JSON.stringify(allHistory)) {
        allHistory = newHistory;
        renderAllHistory();
      }
    }).catch(function() {});
}

// ========== Init: fetch server data first, then render ==========
function initFromServer(cb) {
  if (!roomId) { cb(); return; }
  fetch(API_BASE + '/api/room/' + roomId + '/poll?since=0&role=' + role)
    .then(function(r) { return r.json(); })
    .then(function(data) {
      if (!data || !data.success) { cb(); return; }
      var otherRole = role === 'ta' ? 'me' : 'ta';
      if (data.dailyQuestion) {
        dqQuestion = data.dailyQuestion;
        dqMe = data.dailyQuestionAnswers[role] || '';
        dqTa = data.dailyQuestionAnswers[otherRole] || '';
        document.getElementById('dailyQuestion').textContent = dqQuestion;
      }
      if (data.challengeQuestion) {
        chQuestion = data.challengeQuestion;
        chGuessMe = data.challengeGuesses['me'] || '';
        chGuessTa = data.challengeGuesses['ta'] || '';
        chAnswerMe = data.challengeAnswers['me'] || '';
        chAnswerTa = data.challengeAnswers['ta'] || '';
        document.getElementById('challengeQuestion').textContent = chQuestion;
      }
      if (data.truthQuestion) {
        trQuestion = data.truthQuestion;
        trMe = data.truthShares['me'] || '';
        trTa = data.truthShares['ta'] || '';
        document.getElementById('truthQuestion').textContent = trQuestion;
      }
      if (data.photoExchange) {
        photoMe = data.photoExchange['me'] || { photoUrl: '', note: '', uploaded: false, timestamp: 0 };
        photoTa = data.photoExchange['ta'] || { photoUrl: '', note: '', uploaded: false, timestamp: 0 };
      }
      if (data.photoHistory) {
        photoHistory = data.photoHistory;
      }
      var newHistory = [];
      (data.dailyQuestionHistory || []).forEach(function(h) { h.type = 'daily'; newHistory.push(h); });
      (data.challengeHistory || []).forEach(function(h) { h.type = 'challenge'; newHistory.push(h); });
      (data.truthHistory || []).forEach(function(h) { h.type = 'truth'; newHistory.push(h); });
      newHistory.sort(function(a, b) { return (a.timestamp || 0) - (b.timestamp || 0); });
      allHistory = newHistory;
      cb();
    }).catch(function() { cb(); });
}

initFromServer(function() {
  // ========== Initial render (after server data loaded) ==========
  renderDaily();
  renderChallenge();
  renderTruth();
  renderPhotoExchange();
  renderAllHistory();

  // ========== Start polling ==========
  if (roomId) {
    pollServer();
    setInterval(pollServer, 3000);

});
