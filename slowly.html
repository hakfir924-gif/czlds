  <a class="nav-item" href="./whisper.html" id="navWhisper">
    <span class="nav-icon">🤲</span>
    <span>轻声说</span>
  </a>
  <a class="nav-item" href="./heart-qa.html" id="navHeart">
    <span class="nav-icon">💭</span>
    <span>心问答</span>
  </a>
  <a class="nav-item active" href="./slowly.html" id="navSlowly">
    <span class="nav-icon">📝</span>
    <span>慢慢来</span>
  </a>
</nav>

<script>
// ===== API =====
var API_BASE = (location.hostname === 'localhost' || location.hostname === '127.0.0.1') ? 'http://localhost:3000' : 'http://' + location.hostname + ':3000';
var params = new URLSearchParams(window.location.search);
var roomId = params.get('roomId') || '';
var role = params.get('role') || 'me';

// ===== 加载并渲染时间线 =====
(function() {
  var container = document.getElementById('timelineContainer');
  var today = new Date().toLocaleDateString('zh-CN');

  function renderTimeline(allEntries) {
    if (allEntries.length === 0) {
      container.innerHTML =
        '<div class="empty-state">' +
        '<div class="empty-icon">📝</div>' +
        '<div class="empty-title">还没有记录</div>' +
        '<div class="empty-desc">在首页更新状态、问问Ta、轻声说或刷新"一起的事"，都会自动出现在这里。</div>' +
        '</div>';
      return;
    }

    allEntries.sort(function(a, b) { return a.time.localeCompare(b.time); });

    var groups = {};
    allEntries.forEach(function(e) {
      var d = e.date || today;
      if (!groups[d]) groups[d] = [];
      groups[d].push(e);
    });

    var html = '';
    var dates = Object.keys(groups).sort();

    dates.forEach(function(date) {
      var dateLabel = date === today ? '— 今天 —' : '— ' + date + ' —';
      html += '<div class="date-header">' + dateLabel + '</div>';
      html += '<div class="timeline">';

      groups[date].forEach(function(e) {
        var whoLabel = e.who === 'me' ? '我' : (e.who === 'ta' ? 'Ta' : '双方');
        var whoClass = e.who === 'me' ? 'me' : (e.who === 'ta' ? 'ta' : 'both');

        if (e.type === 'glimmer') {
          html += '<div class="timeline-item">';
          html += '<div class="tl-time">' + e.time + '</div>';
          html += '<span class="tl-badge glimmer">微光</span>';
          html += '<span class="tl-who ' + whoClass + '">' + whoLabel + '</span>';
          if (e.status) html += '<div class="tl-text">' + e.status + '</div>';
          if (e.text) html += '<div class="tl-text">' + e.text + '</div>';
          html += '</div>';
        } else if (e.type === 'whisper') {
          html += '<div class="timeline-item">';
          html += '<div class="tl-time">' + e.time + '</div>';
          html += '<span class="tl-badge whisper">轻声说</span>';
          html += '<span class="tl-who ' + whoClass + '">' + whoLabel + '</span>';
          html += '<div class="tl-text">' + e.summary + '</div>';
          if (e.text) html += '<div class="tl-text" style="font-size:0.82rem;color:var(--muted);margin-top:2px;">"' + e.text + '"</div>';
          html += '</div>';
        } else if (e.type === 'together') {
          html += '<div class="timeline-item">';
          html += '<div class="tl-time">' + e.time + '</div>';
          html += '<span class="tl-badge together">一起的事</span>';
          html += '<span class="tl-who ' + whoClass + '">' + whoLabel + '</span>';
          html += '<div class="tl-text">一起做了一件小事：' + e.item + '</div>';
          html += '</div>';
        } else if (e.type === 'ask') {
          html += '<div class="timeline-item">';
          html += '<div class="tl-time">' + e.time + '</div>';
          html += '<span class="tl-badge ask">问问Ta</span>';
          html += '<span class="tl-who ' + whoClass + '">' + whoLabel + '</span>';
          html += '<div class="tl-text">问了Ta一个问题：' + e.question + '</div>';
          html += '</div>';
        } else if (e.type === 'daily') {
          html += '<div class="timeline-item">';
          html += '<div class="tl-time">' + e.time + '</div>';
          html += '<span class="tl-badge daily">每日一问</span>';
          html += '<span class="tl-who both">双方</span>';
          html += '<div class="tl-text">' + e.question + '</div>';
          html += '<div class="tl-text" style="font-size:0.78rem;color:var(--muted);margin-top:2px;">🔸 我：' + e.me + '</div>';
          html += '<div class="tl-text" style="font-size:0.78rem;color:var(--muted);">🔹 Ta：' + e.ta + '</div>';
          html += '</div>';
        } else if (e.type === 'challenge') {
          html += '<div class="timeline-item">';
          html += '<div class="tl-time">' + e.time + '</div>';
          html += '<span class="tl-badge challenge">默契挑战</span>';
          html += '<span class="tl-who both">双方</span>';
          html += '<div class="tl-text">' + e.question + '</div>';
          html += '<div class="tl-text" style="font-size:0.78rem;color:var(--muted);margin-top:2px;">🔸 我猜Ta：' + e.meGuess + ' | Ta说：' + e.taAnswer + '</div>';
          html += '<div class="tl-text" style="font-size:0.78rem;color:var(--muted);">🔹 Ta猜我：' + e.taGuess + ' | 我说：' + e.meAnswer + '</div>';
          html += '</div>';
        } else if (e.type === 'truth') {
          html += '<div class="timeline-item">';
          html += '<div class="tl-time">' + e.time + '</div>';
          html += '<span class="tl-badge truth">真心话</span>';
          html += '<span class="tl-who both">双方</span>';
          html += '<div class="tl-text">' + e.question + '</div>';
          if (e.me) html += '<div class="tl-text" style="font-size:0.78rem;color:var(--muted);margin-top:2px;">🔸 我：' + e.me + '</div>';
          if (e.ta) html += '<div class="tl-text" style="font-size:0.78rem;color:var(--muted);">🔹 Ta：' + e.ta + '</div>';
          html += '</div>';
        }
      });

      html += '</div>';
    });

    container.innerHTML = html;
  }

  // Load from server if roomId exists
  if (roomId) {
    fetch(API_BASE + '/api/room/' + roomId + '?token=' + roomToken)
      .then(function(r) { return r.json(); })
      .then(function(data) {
        if (!data.success) {
          loadFromLocalStorage();
          return;
        }
        var rd = data.roomData;
        var allEntries = [];

        rd.glimmerEntries.forEach(function(e) {
          allEntries.push({
            time: e.time, type: 'glimmer', who: e.type || 'me',
            status: e.status || '', text: e.text || '', date: e.date || today
          });
        });
        rd.whisperRecords.forEach(function(e) {
          allEntries.push({
            time: e.time, type: 'whisper', who: 'me',
            summary: e.summary || '', text: e.text || '', date: e.date || today
          });
        });
        rd.togetherRecords.forEach(function(e) {
          allEntries.push({
            time: e.time, type: 'together', who: 'me',
            item: e.item || '', date: e.date || today
          });
        });
        rd.askRecords.forEach(function(e) {
          allEntries.push({
            time: e.time, type: 'ask', who: 'me',
            question: e.question || '', date: e.date || today
          });
        });
        (rd.dailyQuestionHistory || []).forEach(function(e) {
          allEntries.push({
            time: new Date(e.timestamp).toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' }),
            type: 'daily', who: 'both',
            question: e.question || '', me: e.me || '', ta: e.ta || '', date: e.date || today
          });
        });
        (rd.challengeHistory || []).forEach(function(e) {
          allEntries.push({
            time: new Date(e.timestamp).toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' }),
            type: 'challenge', who: 'both',
            question: e.question || '', meGuess: e.meGuess || '', meAnswer: e.meAnswer || '',
            taGuess: e.taGuess || '', taAnswer: e.taAnswer || '', date: e.date || today
          });
        });
        (rd.truthHistory || []).forEach(function(e) {
          allEntries.push({
            time: new Date(e.timestamp).toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' }),
            type: 'truth', who: 'both',
            question: e.question || '', me: e.me || '', ta: e.ta || '', date: e.date || today
          });
        });

        renderTimeline(allEntries);
      })
      .catch(function() { loadFromLocalStorage(); });
  } else {
    loadFromLocalStorage();
  }

  function loadFromLocalStorage() {
    var allEntries = [];
    var glimmerEntries = JSON.parse(localStorage.getItem('mm_glimmer_entries') || '[]');
    glimmerEntries.forEach(function(e) {
      allEntries.push({ time: e.time, type: 'glimmer', who: e.type || 'me', status: e.status || '', text: e.text || '', date: today });
    });
    var whisperRecords = JSON.parse(localStorage.getItem('mm_whisper_records') || '[]');
    whisperRecords.forEach(function(e) {
      allEntries.push({ time: e.time, type: 'whisper', who: 'me', summary: e.summary || '', text: e.text || '', date: e.date || today });
    });
    var togetherRecords = JSON.parse(localStorage.getItem('mm_together_records') || '[]');
    togetherRecords.forEach(function(e) {
      allEntries.push({ time: e.time, type: 'together', who: 'me', item: e.item || '', date: e.date || today });
    });
    var askRecords = JSON.parse(localStorage.getItem('mm_ask_records') || '[]');
    askRecords.forEach(function(e) {
      allEntries.push({ time: e.time, type: 'ask', who: 'me', question: e.question || '', date: e.date || today });
    });
    renderTimeline(allEntries);
  }
})();

// ===== Update nav links =====
if (roomId) {
  var navSuffix = '?roomId=' + roomId + '&role=' + role + '&token=' + roomToken;
  var navLinks = document.querySelectorAll('.nav-item');
  navLinks[0].href = './manmanshuo.html' + navSuffix;
  navLinks[1].href = './whisper.html' + navSuffix;
  navLinks[2].href = './heart-qa.html' + navSuffix;
  navLinks[3].href = './slowly.html' + navSuffix;
  document.getElementById('backLink').href = './manmanshuo.html' + navSuffix;
}
</script>

</body>
