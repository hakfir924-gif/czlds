<body>

<!-- Floating dots -->
<div class="float-dot"></div>
<div class="float-dot"></div>
<div class="float-dot"></div>
<div class="float-dot"></div>
<div class="float-dot"></div>
<div class="float-dot"></div>

<div class="page">

  <!-- Envelope scene -->
  <div class="envelope-scene" id="envelopeScene" onclick="openEnvelope()">
    <div class="wax-glow"></div>
    <div class="wax-seal"></div>
    <div class="envelope-front"></div>
    <div class="envelope-flap"></div>
    <div class="envelope"></div>

    <!-- Letter -->
    <div class="letter">
      <div class="letter-content">
        <div class="sign-type" id="signType"></div>
        <div class="sign-text" id="signText"></div>
      </div>
    </div>
  </div>

  <p class="hint" id="hintText">点击拆开今天的小签</p>

  </div>

<script>
// ========== API ==========
var API_BASE = 'http://localhost:3000';

// ========== URL params ==========
var params = new URLSearchParams(window.location.search);
var roomId = params.get('roomId') || '';
var role = params.get('role') || 'me';
var roomToken = params.get('token') || '';

// ========== Init ==========
var todaySign = { type: '一句话', content: '今天不用很完美，今天你已经在对方心里了。' };

// Try to get sign from server
if (roomId) {
  fetch(API_BASE + '/api/room/' + roomId)
    .then(function(r) { return r.json(); })
    .then(function(data) {
      if (data.success && data.roomData && data.roomData.signOfDay) {
        todaySign = data.roomData.signOfDay;
      }
      renderSign();
    })
    .catch(function() {
      renderSign();
    });
} else {
  renderSign();
}

function renderSign() {
  document.getElementById('signType').textContent = todaySign.type;
  document.getElementById('signText').textContent = todaySign.content;
}

var opened = false;

function openEnvelope() {
  if (opened) return;
  opened = true;

  var scene = document.getElementById('envelopeScene');
  var hint = document.getElementById('hintText');

  scene.classList.add('opened');
  hint.textContent = '';

  // Auto fade to main space after 4.5 seconds
  setTimeout(function() {
    document.body.style.transition = 'opacity 0.8s ease';
    document.body.style.opacity = '0';
    var type = encodeURIComponent(todaySign.type);
    var content = encodeURIComponent(todaySign.content);
    setTimeout(function() {
      var url = './manmanshuo.html?signType=' + type + '&signContent=' + content;
      if (roomId) {
        url += '&roomId=' + roomId + '&role=' + role + '&token=' + roomToken;
      }
      window.location.href = url;
    }, 800);
  }, 4500);
}

// Keyboard: Enter to open
document.addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && !opened) {
    openEnvelope();
  }
});
</script>

</body>
